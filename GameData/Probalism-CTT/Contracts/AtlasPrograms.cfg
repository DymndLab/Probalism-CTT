CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_Uriel_Crewed_Landing
    group = AtlasPrograms
    agent = Atlas Systems Group
    sortKey = 39
    title = Uriel VII: Rendezvous Mun Landing
    genericTitle = Complete Atlas' rendezvous-assisted Mun landing mission
    description = Atlas Systems Group has reached the assignment everyone assumed it would claim. Uriel VII combines rendezvous, landing operations, and safe return into a single Mun mission executed with the kind of calm assurance Atlas has been selling all along.
    genericDescription = Rendezvous with the staged lander, land on the Mun, and return the crew safely to Kerbin.
    synopsis = Rendezvous with the lander in Munar orbit, land a Kerbal on the surface, plant your flag, then bring the crew safely back to Kerbin.
    completedMessage = Uriel VII is complete. Atlas has landed on the Mun by staged rendezvous and returned the crew safely home.
    prestige = Exceptional
    targetBody = Mun
    minExpiry = 8
    maxExpiry = 30
    deadline = 4200
    maxCompletions = 1
    maxSimultaneous = 1
    rewardScience = 36
    rewardReputation = 20
    rewardFunds = 250000
    failureReputation = 20
    failureFunds = 60000
    advanceFunds = 48000

    REQUIREMENT
    {
        name = CompleteContract
        type = CompleteContract
        contractType = PBM_Uriel_Crewed_Orbit
    }

    DATA
    {
        type = double
        hidden = true
        targetAltitude = 12000.0
    }
    DATA
    {
        type = double
        hidden = true
        targetInclination = 0.0
    }
    DATA
    {
        type = double
        hidden = true
        targetEccentricity = 0.01
    }
    DATA
    {
        type = double
        hidden = true
        targetLAN = 25.0
    }
    DATA
    {
        type = double
        hidden = true
        targetMNA = 0.0
    }
    DATA
    {
        type = double
        hidden = true
        targetSMA = Mun.Radius() + @/targetAltitude
    }

    BEHAVIOUR
    {
        name = SpawnVessel
        type = SpawnVessel
        VESSEL
        {
            name = Uriel VI Lander
            craftURL = Probalism-CTT/Ships/Orbital Target Vehicle.craft
            flagURL = Probalism-CTT/Flags/Atlasflag
            vesselType = Ship
            owned = false
            targetBody = Mun
            ORBIT
            {
                SMA = @/targetSMA
                ECC = @/targetEccentricity
                INC = @/targetInclination
                LPE = 0
                LAN = @/targetLAN
                MNA = @/targetMNA
                EPH = 0
                REF = 1
            }
        }
    }

    PARAMETER
    {
        name = VesselParameterGroup
        type = VesselParameterGroup
        title = Fly a new crewed Mun landing mission
        define = PBM_Uriel_Crewed_Landing_Vessel
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
        }
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Carry exactly three crewmembers
            minCrew = 3
            maxCrew = 3
        }
        PARAMETER
        {
            name = PartValidation
            type = PartValidation
            title = Use a Clamp-O-Tron Jr docking port
            part = dockingPort3
            minCount = 1
        }
        PARAMETER
        {
            name = Rendezvous
            type = Rendezvous
            title = Rendezvous with the Uriel VI lander
            vessel = Uriel VI Lander
            distance = 100
            hideChildren = true
            completeInSequence = true
        }
        PARAMETER
        {
            name = Docking
            type = Docking
            title = Dock with the Uriel VI lander
            vessel = Uriel VI Lander
            completeInSequence = true
        }
        PARAMETER
        {
            name = ReachState
            type = ReachState
            title = Land on the Mun
            targetBody = Mun
            situation = LANDED
            completeInSequence = true
        }
        PARAMETER
        {
            name = PlantFlag
            type = PlantFlag
            title = Plant a flag on the Mun
            targetBody = Mun
            completeInSequence = true
        }
        PARAMETER
        {
            name = DockingA
            type = Docking
            title = Return to orbit and dock again
            vessel = Uriel VI Lander
            completeInSequence = true
        }
        PARAMETER
        {
            name = All
            type = All
            title = Return the crew home safely
            hideChildren = true
            completeInSequence = true
            PARAMETER
            {
                name = KerbalDeaths
                type = KerbalDeaths
                title = Bring the crew home alive
                countMax = 0
                vessel = @/PBM_Uriel_Crewed_Landing_Vessel
            }
            PARAMETER
            {
                name = RecoverVessel
                type = RecoverVessel
                title = Recover the crew vehicle on Kerbin
                completeInSequence = true
            }
        }
    }
}
