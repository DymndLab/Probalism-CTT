CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_Uriel_Probe_Flyby
    group = AtlasPrograms
    agent = Atlas Systems Group
    sortKey = 30
    title = Uriel I: Flyby Mun
    genericTitle = Complete the first probed Mun flyby mission
    description = Atlas Systems Group intends to show why it remains the establishment choice for lunar work. The Uriel program begins with a clean, disciplined probe flyby of the Mun.
    genericDescription = Complete the first Uriel Mun flyby mission.
    synopsis = Fly a new uncrewed probe past the Mun and return or transmit useful data.
    completedMessage = Uriel I is complete. Atlas has opened its Mun campaign with the steady confidence everyone expected.
    prestige = Significant
    targetBody = Mun
    minExpiry = 4
    maxExpiry = 20
    deadline = 1600
    maxCompletions = 1
    maxSimultaneous = 1
    rewardScience = 10
    rewardReputation = 7
    rewardFunds = 42000
    failureReputation = 7
    failureFunds = 10000
    advanceFunds = 8000

    REQUIREMENT
    {
        name = CompleteContract
        type = CompleteContract
        contractType = PBM_Kerbalnaut_IV
    }
    REQUIREMENT
    {
        name = MunNotAlreadyReached
        type = Expression
        title = The Mun has not already been reached
        expression = !@targetBody.HaveReached()
    }

    PARAMETER
    {
        name = VesselParameterGroup
        type = VesselParameterGroup
        title = Fly a new Uriel probe past the Mun
        define = PBM_Uriel_One
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
        }
        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = Probe
            title = Use a probe-class vessel
        }
        PARAMETER
        {
            name = HasCrewCapacity
            type = HasCrewCapacity
            title = Use an uncrewed vessel with zero crew capacity
            maxCapacity = 0
            hideChildren = true
        }
        PARAMETER
        {
            name = ReachState
            type = ReachState
            title = Fly by the Mun
            targetBody = Mun
            situation = ESCAPING
            disableOnStateChange = true
        }
        PARAMETER
        {
            name = CollectScience
            type = CollectScience
            title = Return or transmit data from the Mun encounter
            targetBody = Mun
            recoveryMethod = RecoverOrTransmit
        }
    }
}

CONTRACT_TYPE:NEEDS[ContractConfigurator]
