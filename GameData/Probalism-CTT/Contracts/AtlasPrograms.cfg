    genericTitle = Complete Atlas' first Mun impact mission
    description = Atlas Systems Group intends to close on the Mun the old-fashioned way: by learning exactly what survives a hard arrival and what does not. Uriel II will drive a probe into the surface and turn the result into approach and terrain data.
    genericDescription = Complete the first Uriel Mun impact mission.
    synopsis = Deliver a probe to the Mun and ensure it reaches the surface.
    completedMessage = Uriel II is complete. Atlas has put a probe into the Mun hard enough to learn from it.
    prestige = Significant
    targetBody = Mun
    minExpiry = 5
    maxExpiry = 24
    deadline = 2100
    maxCompletions = 1
    maxSimultaneous = 1
    rewardScience = 11
    rewardReputation = 8
    rewardFunds = 50000
    failureReputation = 8
    failureFunds = 13000
    advanceFunds = 9500

    REQUIREMENT
    {
        name = Any
        type = Any
        title = Mun flyby knowledge is available
        REQUIREMENT
        {
            name = CompleteContractA
            type = CompleteContract
            contractType = PBM_Uriel_Probe_Flyby
        }
        REQUIREMENT
        {
            name = Expression
            type = Expression
            title = The Mun has already been reached
            expression = @targetBody.HaveReached()
        }
    }

    PARAMETER
    {
        name = VesselParameterGroup
        type = VesselParameterGroup
        title = Deliver a new Uriel impactor to the Mun
        define = PBM_Uriel_Two
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
        }
        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = Probe
            title = Use a probe-class vessel
        }
        PARAMETER
        {
            name = HasCrewCapacity
            type = HasCrewCapacity
            title = Use an uncrewed vessel with zero crew capacity
            maxCapacity = 0
            hideChildren = true
        }
        PARAMETER
        {
            name = All
            type = All
            title = Impact the Mun
            hideChildren = true
            PARAMETER
            {
                name = ReachState
                type = ReachState
                title = Reach the Mun surface
                targetBody = Mun
                situation = LANDED
                disableOnStateChange = true
                completeInSequence = true
            }
            PARAMETER
            {
                name = VesselDestroyed
                type = VesselDestroyed
                title = Destroy the probe on impact
                mustImpactTerrain = true
                completeInSequence = true
            }
        }
