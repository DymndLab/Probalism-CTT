CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_Beacon_EarlySounding
    group = PROBAPrograms
    agent = PROBA Industries
    sortKey = 02.1
    title = PROBA Beacon Trial: @/packageLabel
    genericTitle = Fly an early PROBA beacon sounding test
    description = PROBA wants more beacon flights before anyone straps a capsule to the front of a booster and calls it a program. The payload is small, the signal is brief, and the rocket is expected to remain pointed mostly upward.\n\nLaunch a new uncrewed probe with a PBM-CB Communications Beacon. Configure a @/packageLabel package, set the trigger altitude to at least @/targetAltitude m, and complete the downlink.
    genericDescription = Fly an early uncrewed sounding rocket and downlink a PROBA beacon transmission.
    synopsis = Trigger and downlink a @/packageLabel PROBA beacon package above @/targetAltitude m.
    completedMessage = Beacon data received. PROBA has filed the result under "small object successfully yelled from altitude."
    prestige = Trivial
    targetBody = HomeWorld()
    minExpiry = 1
    maxExpiry = 6
    deadline = 180
    maxCompletions = 12
    maxSimultaneous = 1
    rewardScience = 1
    rewardReputation = 2
    rewardFunds = 6500
    failureReputation = 1
    failureFunds = 1500
    advanceFunds = 1200

    REQUIREMENT
    {
        name = CompleteStayputnikI
        type = CompleteContract
        contractType = PBM_Stayputnik_I
    }
    REQUIREMENT
    {
        name = KerbalnautINotComplete
        type = CompleteContract
        contractType = PBM_Kerbalnaut_I
        invertRequirement = true
    }

    DATA
    {
        type = List<string>
        hidden = true
        requiredValue = false
        packagePool = [ "ping", "packet" ]
    }
    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        packageId = @/packagePool.Random()
    }
    DATA
    {
        type = string
        hidden = true
        packageLabel = @/packageId == "ping" ? "Ping" : "Packet"
    }
    DATA
    {
        type = double
        hidden = true
        targetAltitude = Random(1500.0, 120000.0)
    }

    PARAMETER
    {
        name = BeaconFlight
        type = VesselParameterGroup
        title = Fly a new uncrewed beacon test
        define = PBM_Beacon_EarlySounding_Vessel
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
        }
        PARAMETER
        {
            name = HasCrewCapacity
            type = HasCrewCapacity
            title = Use an uncrewed vessel with zero crew capacity
            maxCapacity = 0
            hideChildren = true
        }
        PARAMETER
        {
            name = BeaconPart
            type = PartValidation
            title = Carry a PBM-CB Communications Beacon
            part = pbm-comm-beacon
            minCount = 1
        }
        PARAMETER
        {
            name = BeaconDownlink
            type = BeaconTransmission
            title = Downlink a @/packageLabel package above @/targetAltitude m
            requiredPackageId = @/packageId
            minTriggerAltitude = @/targetAltitude
        }
    }
}

CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_Beacon_AdvancedSounding
    group = PROBAPrograms
    agent = PROBA Industries
    sortKey = 10.1
    title = PROBA Beacon Survey: @/packageLabel
    genericTitle = Fly a PROBA beacon survey mission
    description = With the first Kerbalnaut flights underway, PROBA is asking for larger beacon runs at less forgiving altitudes. This is still uncrewed work. The beacon is allowed to be brave; the crew manifest is not.\n\nLaunch a new uncrewed probe with a PBM-CB Communications Beacon. Configure a @/packageLabel package, meet the required modem rate if listed, trigger above @/targetAltitude m, and complete the downlink.
    genericDescription = Fly an uncrewed PROBA beacon survey mission and complete the downlink.
    synopsis = Trigger and downlink a @/packageLabel PROBA beacon package above @/targetAltitude m.
    completedMessage = Beacon survey complete. The payload was louder, heavier, and still easier to debrief than a pilot.
    prestige = Significant
    targetBody = HomeWorld()
    minExpiry = 1
    maxExpiry = 8
    deadline = 260
    maxCompletions = 16
    maxSimultaneous = 1
    rewardScience = 2
    rewardReputation = 3
    rewardFunds = @/rewardFundsValue
    failureReputation = 2
    failureFunds = 2500
    advanceFunds = 1800

    REQUIREMENT
    {
        name = CompleteKerbalnautI
        type = CompleteContract
        contractType = PBM_Kerbalnaut_I
    }
    REQUIREMENT
    {
        name = KerbalnautXNotComplete
        type = CompleteContract
        contractType = PBM_Kerbalnaut_X
        invertRequirement = true
    }

    DATA
    {
        type = List<string>
        hidden = true
        requiredValue = false
        packagePool = [ "ping", "packet", "burst", "stream" ]
    }
    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        packageId = @/packagePool.Random()
    }
    DATA
    {
        type = string
        hidden = true
        packageLabel = @/packageId == "ping" ? "Ping" : @/packageId == "packet" ? "Packet" : @/packageId == "burst" ? "Burst" : "Stream"
    }
    DATA
    {
        type = double
        hidden = true
        targetAltitude = @/packageId == "ping" ? Random(18000.0, 90000.0) : @/packageId == "packet" ? Random(50000.0, 140000.0) : @/packageId == "burst" ? Random(90000.0, 180000.0) : Random(140000.0, 200000.0)
    }
    DATA
    {
        type = double
        hidden = true
        minRequiredBandwidth = @/packageId == "stream" ? 2.88 : @/packageId == "burst" ? 1.44 : 0.0
    }
    DATA
    {
        type = double
        hidden = true
        rewardFundsValue = @/packageId == "stream" ? 17000.0 : @/packageId == "burst" ? 13000.0 : @/packageId == "packet" ? 9500.0 : 7500.0
    }

    PARAMETER
    {
        name = BeaconFlight
        type = VesselParameterGroup
        title = Fly a new uncrewed beacon survey
        define = PBM_Beacon_AdvancedSounding_Vessel
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
        }
        PARAMETER
        {
            name = HasCrewCapacity
            type = HasCrewCapacity
            title = Use an uncrewed vessel with zero crew capacity
            maxCapacity = 0
            hideChildren = true
        }
        PARAMETER
        {
            name = BeaconPart
            type = PartValidation
            title = Carry a PBM-CB Communications Beacon
            part = pbm-comm-beacon
            minCount = 1
        }
        PARAMETER
        {
            name = BeaconDownlink
            type = BeaconTransmission
            title = Downlink a @/packageLabel package above @/targetAltitude m
            requiredPackageId = @/packageId
            minTriggerAltitude = @/targetAltitude
            minBandwidth = @/minRequiredBandwidth
        }
    }
}
