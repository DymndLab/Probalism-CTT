CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_Kerbalnaut_V
    group = DYMNDPrograms
    agent = DYMND
    sortKey = 11
    title = Trial V: Danger Zone
    genericTitle = Rescue Jebediah Kerman from orbit with Valentina Kerman
    description = The failure of PROBA's Trial IV has left Jebediah Kerman stranded in orbit after a failure during the initialization of the de-orbiting burn. The question now isn't who will save him but can they even do it in time?
    genericDescription = Launch Valentina, recover Jebediah Kerman from orbit, and return them both safely to Kerbin.
    synopsis = Fly Valentina into orbit, bring Jebediah aboard the rescue craft, and recover both Kerbals safely.
    completedMessage = Trial V is complete. Valentina brought Jebediah home, and DYMND has made it clear that it is the standard-bearer for orbital operations.
    prestige = Exceptional
    targetBody = HomeWorld()
    minExpiry = 0
    maxExpiry = 0
    deadline = 1100
    maxCompletions = 1
    maxSimultaneous = 1
    rewardScience = 13
    rewardReputation = 7
    rewardFunds = 34000
    failureReputation = 7
    failureFunds = 8750
    advanceFunds = 6750

    REQUIREMENT
    {
        name = CompleteContract
        type = CompleteContract
        contractType = PBM_Kerbalnaut_IV
    }

    DATA
    {
        type = Vessel
        title = Jebediah's spacecraft must still be awaiting rescue in orbit
        targetVessel = Vessel(VesselIdentifier("PBM_Kerbalnaut_Four"))
    }

    DATA
    {
        type = string
        hidden = true
        targetVesselName = @/targetVessel.VesselName()
    }

    BEHAVIOUR
    {
        name = PrototypeDockingPort
        type = ExperimentalPart
        part = dockingPort3
        add = True
        remove = True
    }

    PARAMETER
    {
        name = VesselParameterGroup
        type = VesselParameterGroup
        title = Fly Valentina's emergency rescue mission
        define = PBM_Kerbalnaut_Five
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
        }
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Valentina Kerman must pilot the rescue mission
            minCrew = 1
            maxCrew = 1
            kerbal = Valentina Kerman
        }
        PARAMETER
        {
            name = HasCrewCapacity
            type = HasCrewCapacity
            title = Leave room for Jebediah Kerman
            minCapacity = 2
        }
        PARAMETER
        {
            name = PrototypeDockingPort
            type = PartValidation
            title = Carry DYMND's prototype docking interface
            part = dockingPort3
            minCount = 1
        }
    }
    PARAMETER
    {
        name = AscentBeat
        type = ReachState
        hidden = true
        targetBody = HomeWorld()
        minAltitude = 4789
    }
    PARAMETER
    {
        name = Docking
        type = Docking
        title = Dock with @/targetVesselName
        vessel = @/targetVessel
        hideChildren = true
        disableOnStateChange = true
        completeInSequence = true
    }
    PARAMETER
    {
        name = CompleteRescue
        type = CompleteRescue
        title = Bring Jebediah back to Kerbin safely
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Bring Jebediah Kerman aboard
            kerbal = Jebediah Kerman
            completeInSequence = true
        }
        PARAMETER
        {
            name = RecoverKerbal
            type = RecoverKerbal
            title = Recover Jebediah Kerman
            kerbal = Jebediah Kerman
            completeInSequence = true
            hidden=true
        }
        PARAMETER
        {
            name = RecoverVessel
            type = RecoverVessel
            title = Recover the rescue vessel on Kerbin
            completeInSequence = true
        }
    }

    BEHAVIOUR:NEEDS[ChatterBox]
    {
        name = ValentinaFreakOut
        type = ChatterBox
        onState = PARAMETER_COMPLETED
        parameter = AscentBeat
        title = Ascent
        presentation = Action

        characterAKerbal = Valentina Kerman
        characterAColor = #FF9FD3FF

        characterBName = Gene Kerman
        characterBModel = Instructor_Gene
        characterBAnimation = idle
        characterBColor = #FFFFD27A

        LINE
        {
            speaker = A
            text = MC, check pressurization. I think I'm fading.
        }
        LINE
        {
            speaker = B
            text = Your vitals are fine, Val. Hab reads 101 kilopascals.
        }
        LINE
        {
            speaker = A
            text = I think it's me. I shouldn't be here... The sim was nothing like this.
        }
        LINE
        {
            speaker = B
            text = Keep breathing. Hold your heading. You're doin' just fine Val.
        }
        LINE
        {
            speaker = A
            text = ...
        }
        LINE
        {
            speaker = A
            text = Confirm heading is good. I'm stabilizing.
        }
        LINE
        {
            speaker = B
            text = Good. Stay with me. You were built for this.
        }
    }
}

