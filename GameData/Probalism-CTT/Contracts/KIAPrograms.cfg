CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_KIA_Cove_Pilot_Rescue
    group = KIAPrograms
    agent = Kerbin Intelligence Agency
    sortKey = 61
    title = KIA Field Retrieval: The Cove
    genericTitle = Retrieve a stranded KIA pilot from the Cove
    description = Kerbin Intelligence Agency has an operative and a grounded field aircraft sitting out near the Cove. This is still being described as a low-stakes recovery, but they made it clear they need us to lend a plane, a competent pilot, and as few questions as possible. "The aircraft is expendable but the pilot is not. Please return them safely to KSC." Fly a plane to the Cove, pick up the stranded pilot, and return them to KSC. KIA has said they'll allow the pilot to do contract work for us in the future as a thank you.
    genericDescription = Fly a plane to the Cove, recover the stranded pilot, and return them to KSC.
    synopsis = Send a new plane to the Cove, bring the stranded pilot aboard, and return them to KSC.
    completedMessage = The Cove retrieval is complete and the media is none the wiser. KIA released the pilot to your roster with a request that this issue be considered put to rest.
    prestige = Trivial
    targetBody = HomeWorld()
    minExpiry = 4
    maxExpiry = 12
    deadline = 426
    maxCompletions = 1
    maxSimultaneous = 1
    rewardScience = 0
    rewardReputation = 0
    rewardFunds = 0
    failureReputation = 0
    failureFunds = 0
    advanceFunds = 0

    REQUIREMENT
    {
        name = AviationUnlocked
        type = TechResearched
        tech = aviation
    }
    REQUIREMENT
    {
        name = JebRescueComplete
        type = CompleteContract
        contractType = PBM_Kerbalnaut_V
    }

    BEHAVIOUR
    {
        name = MissionWaypoint
        type = WaypointGenerator
        WAYPOINT
        {
            name = KIAS03N72W
            icon = custom
            targetBody = Kerbin
            latitude = 3.7
            longitude = -72.2
            altitude = 0.0
        }
        WAYPOINT
        {
            name = KSC
            icon = custom
            targetBody = Kerbin
            latitude = 0.1025
            longitude = -74.575278
            altitude = 0.0
            parameter = BringPilotAboard
        }
    }
    BEHAVIOUR
    {
        name = SpawnVessel
        type = SpawnVessel
        VESSEL
        {
            name = KIA_Cove_Asset
            craftURL = Probalism-CTT/Ships/KIA-FieldRescue.craft
            flagURL = Probalism-CTT/Flags/KIAflag
            vesselType = Plane
            owned = false
            targetBody = Kerbin
            lat = 3.7
            lon = -72.2
            height = 0.5
            heading = 100.0
        }
    }
    BEHAVIOUR
    {
        name = SpawnKerbal
        type = SpawnKerbal
        KERBAL
        {
            kerbal = NewKerbal(Male, "Pete Mitchell", "Pilot")
            kerbalType = Unowned
            owned = false
            addToRoster = true
            targetBody = Kerbin
            lat = 3.7002
            lon = -72.1997
            heading = 270.0
        }
    }
    BEHAVIOUR
    {
        name = AwardPilotExperience
        type = AwardExperience
        kerbal = Pete Mitchell
        experience = 1
    }
    BEHAVIOUR
    {
        name = RemoveStrandedAircraft
        type = DestroyVessel
        onState = CONTRACT_SUCCESS
        vessel = KIA_Cove_Asset
    }
    BEHAVIOUR:NEEDS[ChatterBox]
    {
        name = RecoveryCraftBriefing
        type = ChatterBox
        onState = CONTRACT_ACCEPTED
        title = Recovery Briefing
        characterAName = Gene
        characterAModel = Instructor_Gene

        LINE
        {
            speaker = A
            text = For this recovery, Mission Control sees two workable options.
        }

        LINE
        {
            speaker = A
            text = You can send a remotely guided one-seat craft, or a two-seater with a pilot aboard. Either way, make sure a return seat is waiting for our passenger.
        }
    }
    BEHAVIOUR:NEEDS[ChatterBox]
    {
        name = RecoveryCraftReady
        type = ChatterBox
        onState = PARAMETER_COMPLETED
        parameter = AssembleRecoveryCraft
        title = Recovery Craft Ready
        presentation = action
        characterAName = Gene
        characterAModel = Instructor_Gene

        LINE
        {
            speaker = A
            text = Recovery craft looks good. Head for the Cove and bring Pete Mitchell home.
        }
    }

    PARAMETER
    {
        name = AssembleRecoveryCraft
        type = Any
        title = Build a suitable recovery craft

        PARAMETER
        {
            name = RemoteRecoveryCraft
            type = VesselParameterGroup
            title = Build a remotely guided one-seat craft
            define = PBM_KIA_Cove_RescuePlane

            PARAMETER
            {
                name = NewVessel
                type = NewVessel
                title = Launch a new plane
                hidden = true
            }
            PARAMETER
            {
                name = VesselIsType
                type = VesselIsType
                vesselType = Plane
                title = Use a plane-class vessel
                hidden = true
            }
            PARAMETER
            {
                name = ProbeControl
                type = PartValidation
                title = Include remote guidance systems
                partModule = ModuleProbeControlPoint
                minCount = 1
                hidden = true
            }
            PARAMETER
            {
                name = NoLaunchCrew
                type = HasCrew
                title = Launch without crew aboard
                maxCrew = 0
                hidden = true
            }
            PARAMETER
            {
                name = OneSeatAvailable
                type = HasCrewCapacity
                title = Bring room for the stranded pilot
                minCapacity = 1
                hidden = true
            }
        }
        PARAMETER
        {
            name = CrewedRecoveryCraft
            type = VesselParameterGroup
            title = Build a two-seater with a pilot aboard
            define = PBM_KIA_Cove_RescuePlane

            PARAMETER
            {
                name = NewVessel
                type = NewVessel
                title = Launch a new plane
                hidden = true
            }
            PARAMETER
            {
                name = VesselIsType
                type = VesselIsType
                vesselType = Plane
                title = Use a plane-class vessel
                hidden = true
            }
            PARAMETER
            {
                name = PilotAboard
                type = HasCrew
                title = Carry a pilot
                trait = Pilot
                minCrew = 1
                hidden = true
            }
            PARAMETER
            {
                name = OnlyOneLaunchCrew
                type = HasCrew
                title = Launch with only one crewmember
                maxCrew = 1
                hidden = true
            }
            PARAMETER
            {
                name = TwoSeatsTotal
                type = HasCrewCapacity
                title = Bring room for the stranded pilot
                minCapacity = 2
                hidden = true
            }
        }
    }
    PARAMETER
    {
        name = PickupPilot
        type = All
        title = Reach Cove and bring Pete Mitchell aboard
        PARAMETER
        {
            name = VisitCove
            type = VisitWaypoint
            title = Reach Cove
            index = 0
            distance = 500
            targetBody = Kerbin
        }
        PARAMETER
        {
            name = BringPilotAboard
            type = HasCrew
            title = Bring Pete Mitchell aboard
            kerbal = Pete Mitchell
            completeInSequence = true
        }
    }
    PARAMETER
    {
        name = ReturnSafely
        type = All
        title = Return to KSC safely
        PARAMETER
        {
            name = ReturnToKSC
            type = VisitWaypoint
            title = Return to KSC
            index = 1
            distance = 500
            showMessages = true
            targetBody = Kerbin
        }
        PARAMETER
        {
            name = RecoverPilot
            type = RecoverKerbal
            title = Recover Pete Mitchell
            kerbal = Pete Mitchell
            completeInSequence = true
        }
        PARAMETER
        {
            name = RecoverVessel
            type = RecoverVessel
            title = Recover the rescue plane on Kerbin
            completeInSequence = true
        }
    }
}

