//--------------------------------------
// Kerbol Laboratories Anomaly Scans
//--------------------------------------

// Body-by-body anomalous signature survey using SCANsat multispectral coverage.
CONTRACT_TYPE:NEEDS[ContractConfigurator,SCANsat]
{
    name = PBM_KerbolLabs_Anomalous_Signature_Survey
    group = KerbolLaboratoriesPrograms
    agent = Kerbol Laboratories
    sortKey = 80
    title = Kerbol Laboratories: Anomalous Signature Survey of @/surveyBody
    genericTitle = Survey anomalous surface signatures
    description = @/descriptionText
    genericDescription = Place an anomaly-capable multispectral scanner in orbit of @/surveyBody, complete the survey, and return the resulting anomaly data.
    synopsis = Conduct a multispectral anomaly survey of @/surveyBody and return the findings.
    completedMessage = @/completedText
    prestige = Significant
    targetBody = @/surveyBody
    minExpiry = 8
    maxExpiry = 30
    deadline = 2200
    maxCompletions = 1
    maxSimultaneous = 2
    rewardScience = 25
    rewardReputation = 8
    rewardFunds = Random(65000.0, 90000.0)
    failureReputation = 10
    failureFunds = 30000
    advanceFunds = 20000

    DATA_EXPAND
    {
        type = CelestialBody
        surveyBodyOption = ReachedBodies().Where(body => body.HasSurface() && !body.IsHomeWorld())
    }

    DATA
    {
        type = CelestialBody
        hidden = true
        requiredValue = true
        uniquenessCheck = CONTRACT_ALL
        surveyBody = @/surveyBodyOption
    }

    DATA
    {
        type = List<AvailablePart>
        hidden = true
        requiredValue = false
        scannerParts = [ AvailablePart(scansat-multi-modis-1), AvailablePart(scansat-multi-abi-1), AvailablePart(scansat-multi-msi-1) ].Where(part => part.IsUnlocked())
    }

    DATA
    {
        type = AvailablePart
        hidden = true
        requiredValue = true
        scannerPart = @/scannerParts.Count() > 0 ? @/scannerParts.Random() : AvailablePart(scansat-multi-modis-1)
    }

    DATA
    {
        type = List<string>
        hidden = true
        requiredValue = false
        closingPool = [
            "Try not to map the same crater twice.",
            "We would prefer discoveries over paperwork, but both will get us a paycheck.",
            "Remember, if the data looks strange that's good. It makes it more valuable.",
            "A tidy map would be ideal, but they'll probably take just about anything."
        ]
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        closingText = @/closingPool.Random()
    }

    DATA
    {
        type = List<string>
        hidden = true
        requiredValue = false
        descriptionPool = [
            "Kerbol Laboratories wants a closer look at @/surveyBody. Put a survey craft carrying a @/scannerPart into orbit, complete a multispectral anomaly scan, and return the results. @/closingText",
            "The analysts insist @/surveyBody is hiding something interesting enough to justify more instrument time. Send a @/scannerPart to the target body, complete the anomaly survey, and bring the data home intact.",
            "Now that @/surveyBody is firmly on the chart, Kerbol Laboratories would like more than distant guesses and optimistic sketches. Fly a @/scannerPart there, map the anomalous signatures from orbit, and return the findings. @/closingText",
            "Kerbol Laboratories has decided that @/surveyBody looks suspicious enough to deserve a dedicated pass. Place a @/scannerPart in orbit around the body, complete the multispectral sweep, and see what unusual features turn up."
        ]
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        descriptionText = @/descriptionPool.Random()
    }

    DATA
    {
        type = List<string>
        hidden = true
        requiredValue = false
        completedMessagePool = [
            "Kerbol Laboratories has its anomaly survey of @/surveyBody and several new opinions about what might be down there.",
            "The survey of @/surveyBody is complete. Kerbol Laboratories now has a fresh anomaly map and a longer list of follow-up questions.",
            "The anomalous signature sweep of @/surveyBody came back cleanly. Kerbol Laboratories is calling the results promising, which usually means expensive."
        ]
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        completedText = @/completedMessagePool.Random()
    }

    REQUIREMENT
    {
        name = ScannerUnlocked
        type = Expression
        title = Must have an anomaly-capable multispectral scanner unlocked
        expression = @/scannerParts.Count() > 0
    }

    // TODO: Replace the reached-body availability path with a verified body-specific Research Bodies researched gate.
    REQUIREMENT
    {
        name = CoverageNeeded
        type = SCANsatCoverage
        targetBody = @/surveyBody
        maxCoverage = 80.0
        scanType = Biome
        title = Must not already have a completed multispectral survey
    }

    PARAMETER
    {
        name = SurveyCraft
        type = VesselParameterGroup
        title = Survey @/surveyBody for anomalous signatures

        PARAMETER
        {
            name = Scanner
            type = PartValidation
            title = Carry @/scannerPart
            part = @/scannerPart
        }

        PARAMETER
        {
            name = Orbit
            type = Orbit
            title = Place a survey craft in orbit of @/surveyBody
            targetBody = @/surveyBody
            completeInSequence = true
        }

        PARAMETER
        {
            name = SCANsatCoverage
            type = SCANsatCoverage
            title = Complete 85% multispectral coverage of @/surveyBody
            targetBody = @/surveyBody
            coverage = 85
            scanType = Biome
            completeInSequence = true
        }

        PARAMETER
        {
            name = AnomalyScience
            type = CollectScience
            title = Return a multispectral anomaly scan from orbit
            targetBody = @/surveyBody
            location = Space
            experiment = SCANsatBiomeAnomaly
            recoveryMethod = RecoverOrTransmit
            completeInSequence = true
        }
    }
}
