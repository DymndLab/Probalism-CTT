//--------------------------------------
// Kerbol Laboratories Sun Stations
//--------------------------------------

// Template-driven probe contracts for the four Sun Station program stages.
CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_KerbolLabs_Sun_Station_Probe
    group = KerbolLaboratoriesSunStationProbePrograms
    agent = Kerbol Laboratories

    DATA_EXPAND
    {
        type = string
        tierId = [ "Inner", "Mid", "Outer", "Deep" ]
    }

    DATA
    {
        type = int
        hidden = true
        idx = @/tierId == "Inner" ? 0 : @/tierId == "Mid" ? 1 : @/tierId == "Outer" ? 2 : 3
    }

    DATA
    {
        type = List<string>
        hidden = true
        stationNames = [ "Riebeck Sun Station", "Chert Sun Station", "Gabbro Sun Station", "Feldspar Sun Station" ]
        missionRoles = [ "solar observation outpost", "extra-terrestrial orbital observatory", "deep-space monitoring platform", "interstellar telescope" ]
        partnerOrgPool = [
            "Kerbal Life Hunting Club",
            "Kerbin Astrobiological Research Agency",
            "Extra-Kerrestrial Enthusiasts",
            "Society for Extra-Kerrestrial Analysis, Research, and Curious Hypotheses",
            "Trial and Error Life Detection Agency",
            "Interplanetary Life Survey Corps"
        ]
        closingPool = [
            "This could be big for us... unless it isn't.",
            "This is the most important mission we've had in a while, but that is still an opinion rather than a measurement.",
            "If @/stationName works as intended, Kerbol Laboratories will almost certainly ask for another one.",
            "We'd prefer discoveries, but entertaining confusion will also suffice.",
            "The region beyond @/unlockBody has remained quiet for far too long, which nobody finds reassuring.",
            "A clean dataset would be ideal. A dramatic one will probably get more funding."
        ]
        probeDescriptionPool = [
            "Kerbol Laboratories has been asked to partner with the @/partnerOrg on the insertion of a probe just beyond the orbit of @/unlockBody. Establish the first stage of the @/stationName program there and put the new @/missionRole into service. @/closing",
            "The @/partnerOrg is eager to see the first stage of the @/stationName program established beyond @/unlockBody, and Kerbol Laboratories has agreed to support the effort. Place the station in solar orbit and put the new @/missionRole into service. @/closing",
            "Kerbol Laboratories and the @/partnerOrg have decided that the next sensible step is to begin the @/stationName program just beyond @/unlockBody. Build the stage-one station, insert it into solar orbit, and turn on the lights. @/closing",
            "Interest in the space beyond @/unlockBody has outpaced our current ability to mind our own business. With support from the @/partnerOrg, Kerbol Laboratories wants the first stage of the @/stationName program established there as a dedicated @/missionRole. @/closing",
            "The initiative for starting the @/stationName program has somehow survived budget review. Deploy its first station just past @/unlockBody and give Kerbol Laboratories a new @/missionRole to check on every 22 minutes. @/closing",
            "The @/partnerOrg has offered to back the first stage of the @/stationName program for Kerbol Laboratories, which means somebody expects it to find something interesting. Place the station beyond @/unlockBody and begin observations. @/closing"
        ]
        probeCompletedPool = [
            "@/stationName has reached its target orbit. Congratulations! The agency's social media account is already going viral!",
            "@/stationName is in position and sending back its first returns. No one's in the office to read the data though. Last night was karaoke night...",
            "@/stationName is in place and ready to be abandoned for a new save with \"a better set of mods this time, trust me.\"",
            "@/stationName is operational and is already sending data back through the DSN. The engineers at KSC are absolutely delighted!"
        ]
        orbitTitles = [ "Enter a safe inner solar orbit", "Enter a safe mid-solar orbit", "Enter a safe deep solar orbit", "Enter a safe far-solar orbit" ]
        waitingTexts = [ "Confirming Riebeck Sun Station's orbit", "Confirming Chert Sun Station's orbit", "Confirming Gabbro Sun Station's orbit", "Confirming Feldspar Sun Station's orbit" ]
        completionTexts = [ "Inner solar orbit confirmed", "Mid solar orbit confirmed", "Deep solar orbit confirmed", "Far outer solar orbit confirmed" ]
        scienceTitles = [ "Return the first solar observation set", "Return the second solar observation set", "Return the deep-space observation set", "Return the far-outer observation set" ]
        scienceSetNotes = [ "Launch an automated station into solar orbit just beyond @/unlockBody and return its first observation package.", "Launch an automated station into solar orbit just beyond @/unlockBody and return its first observation package.", "Launch an automated station into solar orbit just beyond @/unlockBody and return the first deep-space observation package available there.", "Launch an automated station into solar orbit just beyond @/unlockBody and return the first deep-space observation package available there." ]
        synopses = [ "Establish the first stage of the @/stationName program and return the initial observation package.", "Establish the first stage of the @/stationName program and return the initial observation package.", "Establish the first stage of the @/stationName program and return the initial observation package.", "Establish the first stage of the @/stationName program and return the initial observation package." ]
        probeDefines = [ "PBM_KerbolLabs_InnerSunStation", "PBM_KerbolLabs_MidSunStation", "PBM_KerbolLabs_OuterSunStation", "PBM_KerbolLabs_DeepSunStation" ]
        probeDefineLists = [ "KerbolLabsInnerStations", "KerbolLabsMidStations", "KerbolLabsOuterStations", "KerbolLabsDeepStations" ]
        prestigeValues = [ "Significant", "Significant", "Exceptional", "Exceptional" ]
    }

    DATA
    {
        type = List<CelestialBody>
        hidden = true
        unlockBodies = [ Eve, Duna, Sarnus, Urlum ]
    }

    DATA
    {
        type = List<double>
        hidden = true
        durationValues = [ 64800.0, 108000.0, 216000.0, 324000.0 ]
    }

    DATA
    {
        type = List<int>
        hidden = true
        sortKeys = [ 70, 72, 74, 76 ]
        minExpiries = [ 10, 14, 20, 25 ]
        maxExpiries = [ 30, 40, 50, 65 ]
        deadlines = [ 2200, 3000, 4600, 6800 ]
        rewardReputations = [ 8, 9, 10, 11 ]
        rewardFundsList = [ 90000, 105000, 120000, 135000 ]
        failureReputations = [ 15, 16, 17, 18 ]
    }

    DATA
    {
        type = List<double>
        hidden = true
        stationMinMults = [ 0.51, 2.20, 14.0, 24.0 ]
        stationMaxMults = [ 0.59, 2.40, 16.0, 26.0 ]
    }

    DATA
    {
        type = ContractPrestige
        hidden = true
        prestigeValue = @/idx < 2 ? Significant : Exceptional
    }

    DATA
    {
        type = string
        hidden = true
        stationName = @/stationNames.ElementAt(@/idx)
        missionRole = @/missionRoles.ElementAt(@/idx)
        partnerOrg = @/partnerOrgPool.Random()
        closing = @/closingPool.Random()
        descriptionText = @/probeDescriptionPool.Random()
        completedText = @/probeCompletedPool.Random()
        orbitTitle = @/orbitTitles.ElementAt(@/idx)
        orbitWaitingText = @/waitingTexts.ElementAt(@/idx)
        orbitCompletionText = @/completionTexts.ElementAt(@/idx)
        scienceTitle = @/scienceTitles.ElementAt(@/idx)
        genericDescriptionText = @/scienceSetNotes.ElementAt(@/idx)
        synopsisText = @/synopses.ElementAt(@/idx)
        probeDefine = @/probeDefines.ElementAt(@/idx)
        probeDefineList = @/probeDefineLists.ElementAt(@/idx)
    }

    DATA
    {
        type = CelestialBody
        hidden = true
        unlockBody = @/unlockBodies.ElementAt(@/idx)
    }

    DATA
    {
        type = int
        hidden = true
        sortKeyValue = @/sortKeys.ElementAt(@/idx)
        minExpiryValue = @/minExpiries.ElementAt(@/idx)
        maxExpiryValue = @/maxExpiries.ElementAt(@/idx)
        deadlineValue = @/deadlines.ElementAt(@/idx)
        rewardRepValue = @/rewardReputations.ElementAt(@/idx)
        rewardFundsValue = @/rewardFundsList.ElementAt(@/idx)
        failureRepValue = @/failureReputations.ElementAt(@/idx)
    }

    DATA
    {
        type = double
        hidden = true
        durationValue = @/durationValues.ElementAt(@/idx)
    }

    DATA
    {
        type = double
        hidden = true
        homeSolarAltitude = HomeWorld().Orbit().SemiMajorAxis() - Sun().Radius()
        stationMinAltitude = @/homeSolarAltitude * @/stationMinMults.ElementAt(@/idx)
        stationMaxAltitude = @/homeSolarAltitude * @/stationMaxMults.ElementAt(@/idx)
    }

    sortKey = @/sortKeyValue
    title = Kerbol Laboratories: @/stationName
    genericTitle = Establish the first stage of the @/stationName program
    description = @/descriptionText
    genericDescription = @/genericDescriptionText
    synopsis = @/synopsisText
    completedMessage = @/completedText
    prestige = [ @/prestigeValue ]
    targetBody = @/unlockBody
    minExpiry = @/minExpiryValue
    maxExpiry = @/maxExpiryValue
    deadline = @/deadlineValue
    maxCompletions = 1
    maxSimultaneous = 1
    rewardScience = 25
    rewardReputation = @/rewardRepValue
    rewardFunds = @/rewardFundsValue
    failureReputation = @/failureRepValue
    failureFunds = 30000
    advanceFunds = 20000

    PARAMETER
    {
        name = ProbeStation
        type = VesselParameterGroup
        title = Establish @/stationName
        define = @/probeDefine
        defineList = @/probeDefineList

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new station
        }

        PARAMETER
        {
            name = ZeroCrewCapacity
            type = HasCrewCapacity
            title = Use an uncrewed station with no onboard crew capacity
            maxCapacity = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = DockingPort
            type = PartValidation
            title = Include at least one docking port
            partModule = ModuleDockingNode
            minCount = 1
        }

        PARAMETER
        {
            name = Communications
            type = HasAntenna
            title = Include a communications antenna
            minAntennaPower = 0
            antennaType = TRANSMIT
        }

        PARAMETER
        {
            name = PowerGeneration
            type = Any
            title = Provide onboard electrical generation

            PARAMETER
            {
                name = SolarPanels
                type = PartValidation
                title = Include one or more solar panels
                hideChildren = true
                partModule = ModuleDeployableSolarPanel
                minCount = 1
            }

            PARAMETER
            {
                name = Generators
                type = PartValidation
                title = Include one or more generators
                hideChildren = true
                partModule = ModuleGenerator
                minCount = 1
            }

            PARAMETER:NEEDS[NearFutureSolar]
            {
                name = CurvedSolarPanels
                type = PartValidation
                title = Include one or more curved solar panels
                hideChildren = true
                partModule = ModuleCurvedSolarPanel
                minCount = 1
            }

            PARAMETER:NEEDS[NearFutureElectrical]
            {
                name = FissionReactors
                type = PartValidation
                title = Include one or more fission reactors
                hideChildren = true
                partModule = FissionReactor
                minCount = 1
            }

            PARAMETER:NEEDS[NearFutureElectrical]
            {
                name = RadioisotopeGenerators
                type = PartValidation
                title = Include one or more radioisotope generators
                hideChildren = true
                partModule = ModuleRadioisotopeGenerator
                minCount = 1
            }

            PARAMETER:NEEDS[Kopernicus]
            {
                name = KopernicusSolarPanels
                type = PartValidation
                title = Include one or more solar panels
                hideChildren = true
                partModule = KopernicusSolarPanel
                minCount = 1
            }
        }

        PARAMETER
        {
            name = Orbit
            type = Orbit
            title = @/orbitTitle
            targetBody = Sun()
            situation = ORBITING
            minApA = @/stationMinAltitude
            maxApA = @/stationMaxAltitude
            minPeA = @/stationMinAltitude
            maxPeA = @/stationMaxAltitude
            maxEccentricity = 0.05
            disableOnStateChange = true
        }

        PARAMETER
        {
            name = Duration
            type = Duration
            duration = @/durationValue
            preWaitText = Reach the assigned solar orbit
            waitingText = @/orbitWaitingText
            completionText = @/orbitCompletionText
            completeInSequence = true
            disableOnStateChange = true
        }

        PARAMETER
        {
            name = ProbeScience
            type = All
            title = @/scienceTitle
            completeInSequence = true

            PARAMETER
            {
                name = EarlyTemperatureScan
                type = CollectScience
                title = Return a thermometer scan from solar orbit
                targetBody = Sun()
                location = Space
                experiment = temperatureScan
                recoveryMethod = RecoverOrTransmit

                REQUIREMENT
                {
                    name = EarlyTierOnly
                    type = Expression
                    expression = @/idx < 2
                }
            }

            PARAMETER
            {
                name = EarlyMagnetometerScan
                type = CollectScience
                title = Return a magnetometer scan from solar orbit
                targetBody = Sun()
                location = Space
                experiment = magnetometer
                recoveryMethod = RecoverOrTransmit

                REQUIREMENT
                {
                    name = EarlyTierOnly
                    type = Expression
                    expression = @/idx < 2
                }
            }

            PARAMETER:NEEDS[Kerbalism]
            {
                name = EarlyRadiationScan
                type = CollectScience
                title = Return a radiation scan from solar orbit
                targetBody = Sun()
                location = Space
                experiment = geigerCounter
                recoveryMethod = RecoverOrTransmit

                REQUIREMENT
                {
                    name = EarlyTierOnly
                    type = Expression
                    expression = @/idx < 2
                }
            }

            PARAMETER:NEEDS[SCANsat]
            {
                name = EarlyVisualSurvey
                type = CollectScience
                title = Return a visual solar survey
                targetBody = Sun()
                location = Space
                experiment = SCANsatVisual
                recoveryMethod = RecoverOrTransmit

                REQUIREMENT
                {
                    name = EarlyTierOnly
                    type = Expression
                    expression = @/idx < 2
                }
            }

            PARAMETER:NEEDS[Kerbalism]
            {
                name = LateRadiationScan
                type = CollectScience
                title = @/idx == 2 ? "Return a radiation scan from deep solar orbit" : "Return a radiation scan from far outer solar orbit"
                targetBody = Sun()
                location = Space
                experiment = geigerCounter
                recoveryMethod = RecoverOrTransmit

                REQUIREMENT
                {
                    name = LateTierOnly
                    type = Expression
                    expression = @/idx >= 2
                }
            }

            PARAMETER:NEEDS[DMagicOrbitalScience]
            {
                name = LateMagnetometerScan
                type = CollectScience
                title = @/idx == 2 ? "Return a magnetometer scan from deep solar orbit" : "Return a magnetometer scan from far outer solar orbit"
                targetBody = Sun()
                location = Space
                experiment = magnetometer
                recoveryMethod = RecoverOrTransmit

                REQUIREMENT
                {
                    name = LateTierOnly
                    type = Expression
                    expression = @/idx >= 2
                }
            }

            PARAMETER:NEEDS[SCANsat]
            {
                name = LateVisualSurvey
                type = CollectScience
                title = Return a visual deep-space survey
                targetBody = Sun()
                location = Space
                experiment = SCANsatVisual
                recoveryMethod = RecoverOrTransmit

                REQUIREMENT
                {
                    name = LateTierOnly
                    type = Expression
                    expression = @/idx >= 2
                }
            }
        }
    }
}

// Template-driven crew contracts for the four Sun Station program stages.
CONTRACT_TYPE:NEEDS[ContractConfigurator,DMagicOrbitalScience]
{
    name = PBM_KerbolLabs_Sun_Station_Crew
    group = KerbolLaboratoriesSunStationCrewPrograms
    agent = Kerbol Laboratories

    DATA_EXPAND
    {
        type = string
        tierId = [ "Inner", "Mid", "Outer", "Deep" ]
    }

    DATA
    {
        type = int
        hidden = true
        idx = @/tierId == "Inner" ? 0 : @/tierId == "Mid" ? 1 : @/tierId == "Outer" ? 2 : 3
    }

    DATA
    {
        type = List<string>
        hidden = true
        stationNames = [ "Riebeck Sun Station", "Chert Sun Station", "Gabbro Sun Station", "Feldspar Sun Station" ]
        missionRoles = [ "solar observation outpost", "extra-terrestrial orbital observatory", "deep-space monitoring platform", "interstellar telescope" ]
        partnerOrgPool = [
            "Kerbal Life Hunting Club",
            "Kerbin Astrobiological Research Agency",
            "Extra-Kerrestrial Enthusiasts",
            "Society for Extra-Kerrestrial Analysis, Research, and Curious Hypotheses",
            "Trial and Error Life Detection Agency",
            "Interplanetary Life Survey Corps"
        ]
        closingPool = [
            "This could be big for us... unless it isn't.",
            "This is the most important mission we've had in a while, but that is still an opinion rather than a measurement.",
            "If @/stationName works as intended, Kerbol Laboratories will almost certainly ask for another one.",
            "We'd prefer discoveries, but entertaining confusion will also suffice.",
            "The region beyond @/unlockBody has remained quiet for far too long, which nobody finds reassuring.",
            "A clean dataset would be ideal. A dramatic one will probably get more funding."
        ]
        crewDescriptionPool = [
            "The @/partnerOrg has offered to help fund the next stage of work at @/stationName. Rendezvous with the station, install the advanced gear needed to expand it into a full @/missionRole, and return the results to Kerbin. @/closing",
            "@/stationName has done the careful, quiet work expected of a machine. Kerbol Laboratories and the @/partnerOrg would now like a crew to meet it in solar orbit, run the advanced observation sequence, and bring the records home intact. @/closing",
            "Automation has taken @/stationName as far as it reasonably can. Send a minimum of three kerbals to the station, complete the crewed observation program, and recover the archive on Kerbin. @/closing",
            "The early returns from @/stationName have been promising enough to justify sending actual kerbals to further complicate matters. Fly a crewed service mission, carry out the advanced research, and bring the data back. @/closing",
            "The @/partnerOrg has asked for more than unattended telemetry from @/stationName. Send a crew to the station, install some additional instrument packages, and recover the results before the next round of budget reviews jeopardize all of this."
        ]
        crewCompletedPool = [
            "The crewed expedition to @/stationName has returned with a fresh archive and more unanswered questions.",
            "Advanced observations at @/stationName are complete, and the data is back on Kerbin for analysis.",
            "@/stationName has now supported a full crewed science run, which Kerbol Laboratories is very proud of. They've invited all the parents to this month's staff meeting.",
            "The service mission to @/stationName came home cleanly, along with exactly the sort of results that lead to more paperwork."
        ]
        crewDefines = [ "PBM_KerbolLabs_InnerCrewVehicle", "PBM_KerbolLabs_MidCrewVehicle", "PBM_KerbolLabs_OuterCrewVehicle", "PBM_KerbolLabs_DeepCrewVehicle" ]
        priorProbeContracts = [
            "PBM_KerbolLabs_Sun_Station_Probe.Inner",
            "PBM_KerbolLabs_Sun_Station_Probe.Mid",
            "PBM_KerbolLabs_Sun_Station_Probe.Outer",
            "PBM_KerbolLabs_Sun_Station_Probe.Deep"
        ]
    }

    DATA
    {
        type = List<int>
        hidden = true
        sortKeys = [ 71, 73, 75, 77 ]
        minExpiries = [ 12, 15, 20, 25 ]
        maxExpiries = [ 35, 40, 50, 65 ]
        deadlines = [ 2600, 3400, 5200, 7600 ]
        rewardReputations = [ 8, 9, 10, 11 ]
        rewardFundsList = [ 90000, 105000, 120000, 135000 ]
        failureReputations = [ 15, 16, 17, 18 ]
    }

    DATA
    {
        type = List<double>
        hidden = true
        stationMinMults = [ 0.51, 2.20, 14.0, 24.0 ]
        stationMaxMults = [ 0.59, 2.40, 16.0, 26.0 ]
    }

    DATA
    {
        type = ContractPrestige
        hidden = true
        prestigeValue = @/idx < 2 ? Significant : Exceptional
    }

    DATA
    {
        type = string
        hidden = true
        stationName = @/stationNames.ElementAt(@/idx)
        missionRole = @/missionRoles.ElementAt(@/idx)
        partnerOrg = @/partnerOrgPool.Random()
        closing = @/closingPool.Random()
        descriptionText = @/crewDescriptionPool.Random()
        completedText = @/crewCompletedPool.Random()
        crewDefine = @/crewDefines.ElementAt(@/idx)
        priorProbeContract = @/priorProbeContracts.ElementAt(@/idx)
        stationListTitle = Must have an active @/stationName in solar orbit
    }

    DATA
    {
        type = int
        hidden = true
        sortKeyValue = @/sortKeys.ElementAt(@/idx)
        minExpiryValue = @/minExpiries.ElementAt(@/idx)
        maxExpiryValue = @/maxExpiries.ElementAt(@/idx)
        deadlineValue = @/deadlines.ElementAt(@/idx)
        rewardRepValue = @/rewardReputations.ElementAt(@/idx)
        rewardFundsValue = @/rewardFundsList.ElementAt(@/idx)
        failureRepValue = @/failureReputations.ElementAt(@/idx)
    }

    DATA
    {
        type = double
        hidden = true
        homeSolarAltitude = HomeWorld().Orbit().SemiMajorAxis() - Sun().Radius()
        stationMinAltitude = @/homeSolarAltitude * @/stationMinMults.ElementAt(@/idx)
        stationMaxAltitude = @/homeSolarAltitude * @/stationMaxMults.ElementAt(@/idx)
    }

    DATA
    {
        type = List<VesselIdentifier>
        hidden = true
        requiredValue = false
        title = @/stationListTitle
        stationList = @/tierId == "Inner" ? $KerbolLabsInnerStations.Where(vi => Vessel(vi).IsOrbiting() && Vessel(vi).CelestialBody() == Sun() && Vessel(vi).Orbit().Eccentricity() <= 0.05 && Vessel(vi).Orbit().Periapsis() >= @/stationMinAltitude && Vessel(vi).Orbit().Apoapsis() <= @/stationMaxAltitude) : @/tierId == "Mid" ? $KerbolLabsMidStations.Where(vi => Vessel(vi).IsOrbiting() && Vessel(vi).CelestialBody() == Sun() && Vessel(vi).Orbit().Eccentricity() <= 0.05 && Vessel(vi).Orbit().Periapsis() >= @/stationMinAltitude && Vessel(vi).Orbit().Apoapsis() <= @/stationMaxAltitude) : @/tierId == "Outer" ? $KerbolLabsOuterStations.Where(vi => Vessel(vi).IsOrbiting() && Vessel(vi).CelestialBody() == Sun() && Vessel(vi).Orbit().Eccentricity() <= 0.05 && Vessel(vi).Orbit().Periapsis() >= @/stationMinAltitude && Vessel(vi).Orbit().Apoapsis() <= @/stationMaxAltitude) : $KerbolLabsDeepStations.Where(vi => Vessel(vi).IsOrbiting() && Vessel(vi).CelestialBody() == Sun() && Vessel(vi).Orbit().Eccentricity() <= 0.05 && Vessel(vi).Orbit().Periapsis() >= @/stationMinAltitude && Vessel(vi).Orbit().Apoapsis() <= @/stationMaxAltitude)
    }

    DATA
    {
        type = VesselIdentifier
        hidden = true
        requiredValue = false
        uniquenessCheck = GROUP_ACTIVE
        targetStation = @/stationList.SelectUnique()
    }

    sortKey = @/sortKeyValue
    title = Kerbol Laboratories: Service @/stationName
    genericTitle = Send a three-kerbal expedition to @/stationName
    description = @/descriptionText
    genericDescription = Send a crew to @/stationName, perform advanced solar observations, and recover the data on Kerbin.
    synopsis = Rendezvous with @/stationName, perform advanced solar observations, and recover the mission on Kerbin.
    completedMessage = @/completedText
    prestige = [ @/prestigeValue ]
    targetBody = Sun()
    minExpiry = @/minExpiryValue
    maxExpiry = @/maxExpiryValue
    deadline = @/deadlineValue
    maxCompletions = 1
    maxSimultaneous = 1
    rewardScience = 25
    rewardReputation = @/rewardRepValue
    rewardFunds = @/rewardFundsValue
    failureReputation = @/failureRepValue
    failureFunds = 30000
    advanceFunds = 20000

    REQUIREMENT
    {
        name = PriorStationEstablished
        type = CompleteContract
        contractType = @/priorProbeContract
    }

    REQUIREMENT
    {
        name = ActiveStationAvailable
        type = Expression
        title = @/stationListTitle
        expression = @/stationList.Count() > 0
    }

    REQUIREMENT
    {
        name = RPWSUnlocked
        type = PartUnlocked
        part = rpwsAnt
    }

    REQUIREMENT
    {
        name = ScopeUnlocked
        type = PartUnlocked
        part = dmscope
    }

    PARAMETER
    {
        name = CrewExpedition
        type = VesselParameterGroup
        title = Fly a three-kerbal expedition to @/stationName
        define = @/crewDefine

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new expedition vehicle
        }

        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Carry exactly three kerbals
            minCrew = 3
            maxCrew = 3
        }

        PARAMETER
        {
            name = Rendezvous
            type = Rendezvous
            title = Rendezvous with @/stationName
            vessel = @/targetStation
            distance = 500.0
            completeInSequence = true
        }

        PARAMETER
        {
            name = Docking
            type = Docking
            title = Dock with @/stationName
            vessel = @/targetStation
            completeInSequence = true
        }

        PARAMETER
        {
            name = AdvancedScience
            type = All
            title = Return the advanced solar observations
            completeInSequence = true

            PARAMETER
            {
                name = RPWS
                type = CollectScience
                title = Recover a radio plasma wave scan from the station
                targetBody = Sun()
                location = Space
                experiment = rpwsScan
                recoveryMethod = Recover
            }

            PARAMETER
            {
                name = Scope
                type = CollectScience
                title = Recover orbital telescope observations from the station
                targetBody = Sun()
                location = Space
                experiment = scopeScan
                recoveryMethod = Recover
            }

            PARAMETER
            {
                name = SolarParticles
                type = CollectScience
                title = Recover a solar particle sample if the collector is available
                targetBody = Sun()
                location = Space
                experiment = dmSolarParticles
                recoveryMethod = Recover
                optional = true

                REQUIREMENT
                {
                    name = SolarCollectorUnlocked
                    type = PartUnlocked
                    part = dmSolarCollector
                }
            }
        }

        PARAMETER
        {
