CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_Omega_Oops
    group = OmegaPrograms
    agent = OmegaTron
    sortKey = 23
    title = Oops!
    genericTitle = Rescue an ΩmegaTron tourist from a stranded vehicle in low orbit
    description = ΩmegaTron has reported that SpaceGate-2 is no longer responding to commands. The issue appears to stem from a failure in the vehicle's command circuitry. "We would like to be perfectly clear: this is an isolated incident. Some counterfeit command circuitry has failed on SpaceGate-2, and we have no engineers available to perform a fix so we can get that vehicle back home." They've asked us to send an engineer to perform repairs and restore control of the vehicle. We recommend bringing tools. And possibly a backup plan.
    genericDescription = Rendezvous with the disabled SpaceGate-2 vehicle in low orbit and send an engineer to restore control.
    synopsis = Fly an engineer to low orbit, rendezvous with SpaceGate-2, and restore control of the vehicle.
    completedMessage = Jeffrey B Kerman is back on the ground, and ΩmegaTron has already begun revising the public timeline of events.
    prestige = Significant
    targetBody = HomeWorld()
    minExpiry = 3
    maxExpiry = 22
    deadline = 2100
    maxCompletions = 3
    maxSimultaneous = 1
    rewardScience = 12
    rewardReputation = 10
    rewardFunds = 60000
    failureReputation = 10
    failureFunds = 18000
    advanceFunds = 10000

    REQUIREMENT
    {
        name = OrbitalCrewTransferCapability
        type = CompleteContract
        contractType = PBM_Kerbalnaut_XI
    }

    DATA
    {
        type = double
        hidden = true
        targetAltitude = Random(85000.0, 120000.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetInclination = Random(0.0, 15.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetEccentricity = Random(0.0, 0.02)
    }
    DATA
    {
        type = double
        hidden = true
        targetLAN = Random(0.0, 360.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetMNA = Random(-3.1415926536, 3.1415926536)
    }
    DATA
    {
        type = double
        hidden = true
        targetSMA = HomeWorld().Radius() + @/targetAltitude
    }

    BEHAVIOUR
    {
        name = SpawnVessel
        type = SpawnVessel
        VESSEL
        {
            name = SpaceGate-2
            craftURL = Probalism-CTT/Ships/CraftA.craft
            flagURL = Probalism-CTT/Flags/OmegaLogoflag
            vesselType = Ship
            owned = false
            targetBody = HomeWorld()
            ORBIT
            {
                SMA = @/targetSMA
                ECC = @/targetEccentricity
                INC = @/targetInclination
                LPE = 0
                LAN = @/targetLAN
                MNA = @/targetMNA
                EPH = 0
                REF = 1
            }
            CREW
            {
                name = Jeffrey B Kerman
                addToRoster = false
            }
        }
    }
    BEHAVIOUR
    {
        name = ChangeKerbalType
        type = ChangeKerbalType
        onState = CONTRACT_ACCEPTED
        KERBAL_INFO
        {
            kerbal = Kerbal(Jeffrey B Kerman)
            kerbalType = Tourist
        }
    }
    PARAMETER
    {
        name = VesselParameterGroup
        type = VesselParameterGroup
        title = Fly a new orbital rescue mission
        define = PBM_Omega_Rescue_Vessel
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
        }
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Carry a pilot
            trait = Pilot
            minCrew = 1
        }
        PARAMETER
        {
            name = Orbit
            type = Orbit
            title = Reach low orbit around Kerbin
            targetBody = HomeWorld()
            minPeA = HomeWorld().AtmosphereAltitude() + 5000
            maxApA = HomeWorld().SpaceAltitudeThreshold()
            maxEccentricity = 0.25
        }
        PARAMETER
        {
            name = Rendezvous
            type = Rendezvous
            distance = 100
            vessel = SpaceGate-3
            title = Rendezvous with SpaceGate-3
            hideChildren = true
            completeInSequence = true
        }
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Bring Jeffrey B Kerman aboard
            kerbal = Kerbal(Jeffrey B Kerman)
            completeInSequence = true
        }
    }
    PARAMETER
    {
        name = RecoverKerbal
        type = RecoverKerbal
        title = Recover Jeffrey B Kerman
        kerbal = Kerbal(Jeffrey B Kerman)
        completeInSequence = true
    }
    PARAMETER
    {
        name = RecoverVessel
        type = RecoverVessel
        title = Recover the rescue vessel on Kerbin
        completeInSequence = true
    }
}

