        }
    }
    PARAMETER
    {
        name = CompleteRescue
        type = CompleteRescue
        title = Bring Billie Eeloo back to Kerbin safely
        PARAMETER
        {
            name = RecoverKerbal
            type = RecoverKerbal
            title = Recover Billie Eeloo
            kerbal = Kerbal(Billie Eeloo)
            completeInSequence = true
