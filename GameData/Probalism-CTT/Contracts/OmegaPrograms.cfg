                MNA = @/targetMNA
                EPH = 0
                REF = 1
            }
            CREW
            {
                name = Billie Eeloo
                gender = Female
                addToRoster = false
            }
        }
    }
    BEHAVIOUR
    {
        name = ChangeKerbalType
