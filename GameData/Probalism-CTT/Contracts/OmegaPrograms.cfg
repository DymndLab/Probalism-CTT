    {
        type = double
        hidden = true
        targetInclination = Random(0.0, 15.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetEccentricity = Random(0.0, 0.02)
    }
    DATA
    {
        type = double
        hidden = true
        targetLAN = Random(0.0, 360.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetMNA = Random(-3.1415926536, 3.1415926536)
    }
    DATA
    {
        type = double
        hidden = true
        targetSMA = HomeWorld().Radius() + @/targetAltitude
    }

    BEHAVIOUR
    {
        name = SpawnVessel
        type = SpawnVessel
        VESSEL
        {
            name = SpaceGate-4
