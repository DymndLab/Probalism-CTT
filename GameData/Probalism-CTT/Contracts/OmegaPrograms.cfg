    synopsis = Fly another rescue mission to low orbit, rendezvous with SpaceGate-4, recover Billie Eeloo, and return him safely.
    completedMessage = Billie Eeloo is back on the ground again, and ΩmegaTron has asked that all references to "again" be omitted from the official report.
    prestige = Significant
    targetBody = HomeWorld()
    minExpiry = 3
    maxExpiry = 22
    deadline = 2100
    maxCompletions = 3
    maxSimultaneous = 1
    rewardScience = 12
    rewardReputation = 10
    rewardFunds = 65000
    failureReputation = 10
    failureFunds = 20000
    advanceFunds = 10000

    REQUIREMENT
    {
        name = FirstOmegaAccident
