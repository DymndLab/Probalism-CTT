    PARAMETER
    {
        name = VesselParameterGroup
        type = VesselParameterGroup
        title = Fly a new orbital rescue mission
        define = PBM_Omega_OopsAgain_Rescue_Vessel
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
        }
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Carry a lone pilot on the rescue mission
            trait = Pilot
            minCrew = 1
            maxCrew = 1
            hideChildren = true
        }
        PARAMETER
        {
            name = HasCrewCapacity
