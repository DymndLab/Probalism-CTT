            {
                name = TerrainImpactDestruction
                type = VesselDestroyed
                title = Destroy the vessel on terrain impact
                mustImpactTerrain = true
                hidden = true
            }
        }
    }

    BEHAVIOUR
    {
        name = UnlockTech
        type = UnlockTech
        techID = srbCapacityEnhancement
    }

    BEHAVIOUR:NEEDS[ChatterBox]
    {
        name = GusUpgradeDialog
        type = ChatterBox
        onState = CONTRACT_COMPLETED
        title = VAB Workshop
        characterAName = Gus
        characterAModel = Strategy_MechanicGuy
        characterAAnimation = false_sadA
        LINE
        {
            speaker = A
            text = Look, all the folks in HQ are behind you. No one thinks that failure is all on your shoulders and you can't let it get you down.\n\nEveryone has been down in the VAB testing some solid motor capacity upgrades I think you'll really like playing with. Head over there and see for yourself.
        }
    }
}

