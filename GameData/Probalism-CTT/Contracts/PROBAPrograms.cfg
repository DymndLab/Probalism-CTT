CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_Stayputnik_I
    group = PROBAPrograms
    agent = PROBA Industries
    sortKey = 01
    title = Stayputnik I: Clear the Tower
    genericTitle = Launch the first uncrewed PROBA Industries test flight
    description = The public is all worked up about this idea of "Space Travel". The Probalistic Group has created a new subsidiary - PROBA - to limit risk to the parent. PROBA has been directed by Mission Control to develop a new probe and get it off the ground. Wernher believes we have a shot at reaching 18 km so let's give it our best effort.\n\nDon't worry too much about how it comes back down lets just see what kind of range we have to work with.
    genericDescription = Launch the first uncrewed test flight.
    synopsis = Fly a new uncrewed probe off the pad, clear 18km, and wait for it to come back down.
    completedMessage = Stayputnik I cleared the tower! The crew is disappointed with the result but we've got improvements in work already at the VAB.
    prestige = Trivial
    targetBody = HomeWorld()
    minExpiry = 0
    maxExpiry = 0
    deadline = 200
    maxCompletions = 1
    maxSimultaneous = 1
    rewardScience = 3
    rewardReputation = 2
    rewardFunds = 9000
    failureReputation = 2
    failureFunds = 2000
    advanceFunds = 1500
    
    PARAMETER
    {
        name = AscentVesselParameterGroup
        type = VesselParameterGroup
        title = Attempt to reach 18km altitude before coming back to Kerbin
        define = PBM_Stayputnik_One
        hideVesselName = true
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
            hidden = true
        }
        PARAMETER
        {
            name = HasCrewCapacity
            type = HasCrewCapacity
            title = Use an uncrewed vessel with zero crew capacity
            maxCapacity = 0
            hidden = true
        }
        PARAMETER
        {
            name = BeaconPart
            type = PartValidation
            title = Carry a PBM-CB Communications Beacon
            part = pbm-comm-beacon
            minCount = 1
        }
        PARAMETER
        {
            name = BeaconDownlink
            type = BeaconTransmission
            title = Downlink the required beacon package
            requiredPackageId = ping
            minTriggerAltitude = 1500
        }
        PARAMETER
        {
            name = AscentReachState
            type = ReachState
            title = Reach an altitude of 18 km
            targetBody = HomeWorld()
            situation = FLYING
            minAltitude = 1500
            disableOnStateChange = true
            hidden = true
            hideChildren = true
        }
        PARAMETER
        {
            name = ComeBackDown
            type = Any
            title = Come back down
            completeInSequence = true
            hidden = true
            PARAMETER
            {
                name = RecoverVessel
                type = RecoverVessel
                title = Recover the vessel on Kerbin
                hidden = true
                hideChildren = true
            }
            PARAMETER
            {
                name = ReturnReachState
                type = ReachState
                title = Land or splash down
                targetBody = HomeWorld()
                situation = LANDED
                situation = SPLASHED
                disableOnStateChange = true
                hidden = true
                hideChildren = true
