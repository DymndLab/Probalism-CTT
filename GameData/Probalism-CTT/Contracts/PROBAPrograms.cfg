CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_PROBA_RendezvousPractice
    group = PROBAPrograms
    agent = PROBA Industries
    sortKey = 16
    title = Rendezvous Practice
    genericTitle = Complete a PROBA rendezvous practice mission
    description = PROBA Industries wants to keep our orbital skills sharp. Launch a crewed spacecraft, rendezvous with a target vehicle in orbit, and bring the crew home safely.
    genericDescription = Complete a PROBA rendezvous practice mission and recover safely.
    synopsis = Fly a crewed mission, rendezvous with a target vehicle in orbit, and recover safely.
    completedMessage = Rendezvous Practice is complete. PROBA Industries has sharpened its orbital handling once again.
    prestige = Trivial
    targetBody = HomeWorld()
    minExpiry = 0
    maxExpiry = 0
    deadline = 60
    maxCompletions = 4
    maxSimultaneous = 1
    rewardScience = 5
    rewardReputation = 1
    rewardFunds = 10000
    advanceFunds = -10000
    
    // Visible parameters:
    // - Fly a new rendezvous practice mission
    // - Launch a new vessel
    // - Carry at least one crewmember
    // - Orbit Kerbin
    // - Rendezvous with the target vehicle in orbit
    // - Recover the vessel on Kerbin

    REQUIREMENT
    {
        name = CompleteContract
        type = CompleteContract
        contractType = PBM_Kerbalnaut_V
        cooldownDuration = 30d
    }

    DATA
    {
        type = double
        hidden = true
        targetAltitude = Random(85000.0, 165000.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetInclination = Random(0.0, 40.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetEccentricity = Random(0.0, 0.02)
    }
    DATA
    {
        type = double
        hidden = true
        targetLAN = Random(0.0, 360.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetMNA = Random(-3.1415926536, 3.1415926536)
    }
    DATA
    {
        type = double
        hidden = true
        targetSMA = HomeWorld().Radius() + @/targetAltitude
    }

    BEHAVIOUR
    {
        name = SpawnVessel
        type = SpawnVessel
        VESSEL
        {
            name = PROBO RPOD Target Practice
            craftURL = Probalism-CTT/Ships/Orbital Target Vehicle.craft
            flagURL = Probalism-CTT/Flags/PROBAflag
            vesselType = Probe
            owned = true
            targetBody = HomeWorld()
            ORBIT
            {
                SMA = @/targetSMA
                ECC = @/targetEccentricity
                INC = @/targetInclination
                LPE = 0
                LAN = @/targetLAN
                MNA = @/targetMNA
                EPH = 0
                REF = 1
            }
        }
    }
    BEHAVIOUR
    {
        name = DestroyVessel
        type = DestroyVessel
        // CONTRACT_COMPLETED cleans up on success, failure, cancellation, and deadline expiry.
        onState = CONTRACT_COMPLETED
        vessel = PROBO RPOD Target Practice
    }

    PARAMETER
    {
        name = VesselParameterGroup
        type = VesselParameterGroup
        title = Fly a new rendezvous practice mission
        define = PBM_PROBA_Rendezvous_Practice
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
        }
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Carry at least one crewmember
            minCrew = 1
        }
        PARAMETER
        {
            name = Orbit
            type = Orbit
            targetBody = HomeWorld()
            minPeA = HomeWorld().AtmosphereAltitude() + 5000
            title = Orbit Kerbin
            disableOnStateChange = true
        }
        PARAMETER
        {
            name = Rendezvous
            type = Rendezvous
            distance = 100
            vessel = PROBO RPOD Target Practice
            title = Rendezvous with the target vehicle in orbit
            hideChildren = true
            disableOnStateChange = true
        }
        PARAMETER
        {
            name = RecoverVessel
            type = RecoverVessel
            title = Recover the vessel on Kerbin
            completeInSequence = true
        }
    }
}
