//---------------------------------
// Probalism Rover Programs
//---------------------------------
// Initial framework file for generic rover fieldwork missions.
// Scope of this first pass:
// - one stock-moon rover survey family
// - SCANsat biome coverage gate
// - family-level reserved body list plumbing
// - Wernher accept/on-site dialogue pools
// - deterministic fallback science via thermometer
//
// Follow-up work expected here:
// - split into early/late/ROC rover families if needed
// - body-specific ROC bonus tables
// - biome-aware or story-aware survey area generation
// - body-specific fallback experiment tables beyond the 2HOT baseline

CONTRACT_TYPE:NEEDS[ContractConfigurator,SCANsat]
{
    name = PBM_Rover_Moon_Fieldwork
    group = ProbalisticGroup
    agent = Probalistic Group
    sortKey = 850
    title = Surface Prospecting: @/targetBody Rover Survey
    genericTitle = Deliver a rover to a promising survey site
    description = @/descriptionText
    genericDescription = Deliver a rover to the marked survey site on a scanned moon, gather baseline surface data, and inspect the area for anything worth a closer look.
    synopsis = Deliver a rover to the marked survey sector on @/targetBody, complete a thermometer reading, and conduct fieldwork in the area.
    completedMessage = @/completedText
    prestige = Significant
    targetBody = @/targetBody
    minExpiry = 6
    maxExpiry = 20
    deadline = 2400
    maxSimultaneous = 1
    rewardScience = 18
    rewardReputation = 5
    rewardFunds = 55000
    failureFunds = 15000
    advanceFunds = 12000

    DATA
    {
        type = List<CelestialBody>
        hidden = true
        requiredValue = false
        // Reserve bodies here when a later bespoke rover mission should replace
        // this generic family for that body only.
        roverFieldworkReservedBodies = [ ]
    }

    DATA
    {
        type = List<CelestialBody>
        hidden = true
        requiredValue = false
        eligibleBodies = AllBodies().Where(body => body.IsMoon() && body.HasSurface() && body.SCANsatCoverage("Biome") >= 80.0 && !@/roverFieldworkReservedBodies.Contains(body))
    }

    DATA
    {
        type = CelestialBody
        hidden = true
        requiredValue = true
        uniquenessCheck = CONTRACT_ALL
        targetBody = @/eligibleBodies.SelectUnique()
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        requiredExperimentPart = "sensorThermometer"
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        requiredExperimentLabel = "2HOT Thermometer"
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        waypointName = @/targetBody.Name() + " Survey Sector"
    }

    DATA
    {
        type = List<string>
        hidden = true
        requiredValue = false
        acceptPool = [
            "We've got SCANsat data back on @/targetBody, and a few locations look promising enough to justify sending wheels instead of more guesses. Deliver a rover to the marked area with the gear needed to inspect anything unusual you find there.",
            "SCANsat has done what it can for us on @/targetBody. The map suggests the sector is worth checking, but maps are not proof. Put a rover on the ground and find out what is actually there.",
            "The orbital survey of @/targetBody has narrowed the search, not solved it. Take a rover to the marked sector and conduct proper fieldwork before anyone starts celebrating discoveries we have not made.",
            "The latest multispectral pass over @/targetBody has produced a shortlist instead of a conclusion. That is sufficient for a rover mission. It is not sufficient for confidence."
        ]
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        acceptText = @/acceptPool.Random()
    }

    DATA
    {
        type = List<string>
        hidden = true
        requiredValue = false
        onsitePool = [
            "We do not know for certain what is out there. That is the point of sending the rover. If the site yields something unusual, good. If it does not, do not leave without the @/requiredExperimentLabel reading.",
            "The survey marks this area as promising, not guaranteed. Treat anything interesting as a success, but treat the @/requiredExperimentLabel reading as mandatory.",
            "Mortimer asked whether we could simply 'find anomalies.' I told him that is not how field science works. Nevertheless, he would like results. At minimum, bring back the @/requiredExperimentLabel data.",
            "If the arm turns up something worth a second look, excellent. If it does not, make certain you still return the @/requiredExperimentLabel result before leaving the area.",
            "We are here to replace inference with evidence. If the evidence is only a clean @/requiredExperimentLabel line and an unremarkable sector report, then that is what we will file."
        ]
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        onsiteText = @/onsitePool.Random()
    }

    DATA
    {
        type = List<string>
        hidden = true
        requiredValue = false
        descriptionPool = [
            "SCANsat coverage of @/targetBody has finally given us a survey sector worth checking on the ground. Deliver a rover to the marked location with a @/requiredExperimentLabel and enough mobility to inspect the area properly. We cannot promise the site contains anything dramatic, so make sure you leave with at least one clean baseline reading before you come home.",
            "The latest biome survey of @/targetBody has identified a promising surface sector for rover work. Send a small rover to the marked location, carry a @/requiredExperimentLabel for a quick baseline result, and inspect the area for anything that warrants closer study. If the sector turns out to be ordinary, the thermometer data is still required.",
            "Now that @/targetBody has decent SCANsat coverage, Mission Control wants wheels on the ground instead of another round of armchair geology. Fly a rover to the marked sector, collect a baseline @/requiredExperimentLabel reading, and see whether the area offers anything more interesting than the orbital data could prove on its own."
        ]
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        descriptionText = @/descriptionPool.Random()
    }

    DATA
    {
        type = List<string>
        hidden = true
        requiredValue = false
        completedPool = [
            "The fieldwork run on @/targetBody is complete. Wernher has the rover data, Mortimer has a result to point at, and the spreadsheets have gained at least one respectable line.",
            "The rover survey of @/targetBody is in the books. Mission Control has its baseline reading and a better idea of whether this sector deserves a second look.",
            "Surface prospecting on @/targetBody is complete. The sector has been inspected, the fallback data came back cleanly, and Wernher is calling that a proper use of everybody's time."
        ]
    }

    DATA
    {
        type = string
        hidden = true
        requiredValue = true
        completedText = @/completedPool.Random()
    }

    REQUIREMENT
    {
        name = EligibleBodyAvailable
        type = Expression
        title = A scanned stock moon must be available for rover fieldwork
        expression = @/eligibleBodies.Count() > 0
    }

    BEHAVIOUR
    {
        name = SurveyWaypoint
        type = WaypointGenerator
        RANDOM_WAYPOINT
        {
            name = @/waypointName
            targetBody = @/targetBody
            icon = thermometer
            altitude = 0.0
            waterAllowed = false
        }
    }

    BEHAVIOUR:NEEDS[ChatterBox]
    {
        name = WernherRoverAccept
        type = ChatterBox
        onState = CONTRACT_ACCEPTED
        title = Survey Briefing
        characterAName = Wernher
        characterAModel = Instructor_Wernher
        characterAAnimation = idle
        speaker = A
        text = @/acceptText
    }

    BEHAVIOUR:NEEDS[ChatterBox]
    {
        name = WernherRoverOnSite
        type = ChatterBox
        onState = PARAMETER_COMPLETED
        parameter = ReachSurveyArea
        title = Survey Site
        characterAName = Wernher
        characterAModel = Instructor_Wernher
        characterAAnimation = idle_wonder
        speaker = A
        text = @/onsiteText
    }

    PARAMETER
    {
        name = RoverFieldwork
        type = VesselParameterGroup
        title = Survey the marked sector on @/targetBody
        define = PBM_Rover_Fieldwork_Vessel

        PARAMETER
        {
            name = HasWheels
            type = PartValidation
            partModule = ModuleWheelMotor
            minCount = 4
            title = Bring a wheeled rover
            hideChildren = true
        }

        PARAMETER
        {
            name = HasThermometer
            type = PartValidation
            part = @/requiredExperimentPart
            minCount = 1
            title = Carry a @/requiredExperimentLabel
            hideChildren = true
        }

        PARAMETER
        {
            name = LandedOnTargetBody
            type = ReachState
            targetBody = @/targetBody
            situation = LANDED
            title = Deploy the rover on @/targetBody
            completeInSequence = true
        }

        PARAMETER
        {
            name = ReachSurveyArea
            type = VisitWaypoint
            index = 0
            distance = 1500
            horizontalDistance = 1500
            title = Reach the marked survey sector
            targetBody = @/targetBody
            completeInSequence = true
            hideOnCompletion = false
        }

        PARAMETER
        {
            name = BaselineReading
            type = CollectScience
            targetBody = @/targetBody
            situation = SrfLanded
            experiment = temperatureScan
            recoveryMethod = RecoverOrTransmit
            title = Return a baseline thermometer reading from the survey sector
            completeInSequence = true
        }

        PARAMETER
        {
            name = SurveyHold
            type = Duration
            duration = 15s
            preWaitText = Beginning surface fieldwork
            waitingText = Working the survey sector
            completionText = Surface fieldwork confirmed
            completeInSequence = true
        }

        // TODO: Add an optional ROC bonus parameter here once the body-specific
        // ROCScience_* tables are in place for the full stock moon pool.
    }
}
