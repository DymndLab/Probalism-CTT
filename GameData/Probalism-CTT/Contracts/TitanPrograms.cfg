// Gabriel VII: final Titan Minmus landing architecture.
// Uses a spawned stand-in for the Gabriel VI staged lander because persisting the exact flown lander across contracts
// is more fragile than a known-good SpawnVessel rendezvous pattern.
CONTRACT_TYPE:NEEDS[ContractConfigurator]
{
    name = PBM_Gabriel_Crewed_Landing
    group = TitanPrograms
    agent = Titan Aerospace Group
    sortKey = 42
    title = Gabriel VII: Rendezvous Minmus Landing
    genericTitle = Complete Titan's rendezvous-assisted Minmus landing mission
    description = Titan has now been contracted to execute the full Minmus landing architecture. This mission, the keystone to the Gabriel program, will bring together rendezvous, surface operations, and safe return into a single demonstration of capability.
    genericDescription = Rendezvous with the staged lander, land on Minmus, and return the crew safely to Kerbin.
    synopsis = Rendezvous with the lander in Minmus orbit, land a Kerbal on the surface, plant your flag, then bring the crew safely back to Kerbin.
    completedMessage = Gabriel VII is complete. Titan has landed on Minmus by staged rendezvous and returned the crew safely home.
    prestige = Exceptional
    targetBody = Minmus
    minExpiry = 8
    maxExpiry = 30
    deadline = 4300
    maxCompletions = 1
    maxSimultaneous = 1
    rewardScience = 36
    rewardReputation = 20
    rewardFunds = 260000
    failureReputation = 20
    failureFunds = 62000
    advanceFunds = 50000

    REQUIREMENT
    {
        name = CompleteContract
        type = CompleteContract
        contractType = PBM_Gabriel_Crewed_Orbit
    }

    DATA
    {
        type = double
        hidden = true
        targetAltitude = 10000.0
    }
    DATA
    {
        type = double
        hidden = true
        targetInclination = 0.0
    }
    DATA
    {
        type = double
        hidden = true
        targetEccentricity = 0.01
    }
    DATA
    {
        type = double
        hidden = true
        targetLAN = 25.0
    }
    DATA
    {
        type = double
        hidden = true
        targetMNA = 0.0
    }
    DATA
    {
        type = double
        hidden = true
        targetSMA = Minmus.Radius() + @/targetAltitude
    }

    // Intended spawned craft:
    // Purpose: stand-in for the Gabriel VI staged Minmus lander used by the final landing architecture mission.
    // Required parts: Mk1 Lander Can, Clamp-O-Tron Jr docking port, landing legs, propulsion sufficient for Minmus descent/ascent.
    // Optional parts: lights, batteries, antennas, RCS.
    // Stability/design constraints: must be stable in a low circular Minmus orbit and safe to dock with before descent.
    BEHAVIOUR
    {
        name = SpawnVessel
        type = SpawnVessel
        VESSEL
        {
            name = Gabriel VI Lander
            craftURL = Probalism-CTT/Ships/Orbital Target Vehicle.craft
            flagURL = Probalism-CTT/Flags/Titanflag
            vesselType = Ship
            owned = false
            targetBody = Minmus
            ORBIT
            {
                SMA = @/targetSMA
                ECC = @/targetEccentricity
                INC = @/targetInclination
                LPE = 0
                LAN = @/targetLAN
                MNA = @/targetMNA
                EPH = 0
