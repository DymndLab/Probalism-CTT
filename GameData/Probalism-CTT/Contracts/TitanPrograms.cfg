        }
        PARAMETER
        {
            name = PartValidation
            type = PartValidation
            title = Carry a Clamp-O-Tron Jr docking port
            part = dockingPort3
            minCount = 1
        }
        PARAMETER
        {
            name = Rendezvous
            type = Rendezvous
            distance = 100
            vessel = Aegis XI Return Craft
            title = Rendezvous with the disabled Aegis XI return craft
            hideChildren = true
            completeInSequence = true
