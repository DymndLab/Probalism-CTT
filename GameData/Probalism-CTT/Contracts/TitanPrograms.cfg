    notes = Ryan Kerman is believed to be sheltering inside the crippled return craft. Bring the Aegis XI vehicle home.
    completedMessage = Ryan Kerman is home. Titan got its survivor back, and for once even Mission Control has the decency to keep the applause quiet.
