    {
        name = HighOrbitCapability
        type = CompleteContract
        contractType = PBM_Kerbalnaut_XI
    }
    REQUIREMENT
    {
        name = DockingPortUnlocked
        type = PartUnlocked
        part = dockingPort3
    }

    DATA
    {
        type = double
        hidden = true
        targetAltitude = Random(190000.0, 320000.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetInclination = Random(0.0, 18.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetEccentricity = Random(0.0, 0.03)
    }
    DATA
    {
        type = double
        hidden = true
        targetLAN = Random(0.0, 360.0)
    }
    DATA
    {
        type = double
        hidden = true
        targetMNA = Random(-3.1415926536, 3.1415926536)
    }
    DATA
    {
        type = double
        hidden = true
        targetSMA = HomeWorld().Radius() + @/targetAltitude
    }

    BEHAVIOUR
    {
        name = SpawnVessel
        type = SpawnVessel
        VESSEL
        {
            name = Aegis XI Return Craft
            craftURL = Probalism-CTT/Ships/SavingKerbalnautRyan.craft
