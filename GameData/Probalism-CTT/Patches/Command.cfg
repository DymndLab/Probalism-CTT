        @PART[landerCabinSmall]
        {
            @TechRequired = firstMannedLander
        }

        @PART[mk2LanderCabin]
        {
            @TechRequired = specializedLanders
        }

        @PART[mk2LanderCabin_v2]
        {
            @TechRequired = specializedLanders
        }

        @PART[MEMLander]:NEEDS[SquadExpansion/MakingHistory]
        {
            @TechRequired = specializedLanders
