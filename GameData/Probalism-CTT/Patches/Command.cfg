//---------------------
// Stock Command Modules
//---------------------

        @PART[mk1-3pod]
        {
            @TechRequired = specializedCommandModules
        }

        @PART[kv1Pod]:NEEDS[SquadExpansion/MakingHistory]
        {
            @TechRequired = simpleReentry
        }

        @PART[kv2Pod]:NEEDS[SquadExpansion/MakingHistory]
        {
            @TechRequired = reentry
        }

        @PART[kv3Pod]:NEEDS[SquadExpansion/MakingHistory]
        {
            @TechRequired = efficientReentry
        }

        @PART[mk1pod_v2]
        {
            @TechRequired = simpleCommandModules
        }

//-------------------------------
// Advanced and Heavy Command Pods
//-------------------------------

        @PART[Mk2Pod]:NEEDS[SquadExpansion/MakingHistory]
        {
            @TechRequired = heavyCommandModules
        }

        @PART[command-125-1]:NEEDS[NearFutureSpacecraft]
        {
            @TechRequired = commandModules
        }

        @PART[command-125-orbit-1]:NEEDS[NearFutureSpacecraft]:AFTER[NearFutureSpacecraft]
        {
            @TechRequired = commandModules
        }

        @PART[command-25-1]:NEEDS[NearFutureSpacecraft]:AFTER[NearFutureSpacecraft]
        {
            @TechRequired = specializedCommandCenters
        }

        @PART[command-mk3-9]:NEEDS[NearFutureSpacecraft]:AFTER[NearFutureSpacecraft]
        {
            @TechRequired = specializedCommandCenters
        }
        @PART[command-375-biconic-1]:NEEDS[NearFutureSpacecraft]
        {
            @TechRequired = heavyCommandCenters
        }

//-------
// Landers
