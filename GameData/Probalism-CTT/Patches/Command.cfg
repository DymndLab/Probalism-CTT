//------------------------------
// Guidance Units and Drone Cores
//------------------------------

        @PART[probeStackSmall]
        {
            @TechRequired = advElectrics
        }

        @PART[probeStackLarge]
        {
            @TechRequired = unmannedTech
        }

        @PART[mk2DroneCore]
        {
            @TechRequired = specializedFlightSystems
        }

        @PART[mk1DroneCore]:NEEDS[AirplanePlus]
        {
            @TechRequired = specializedFlightSystems
        }

        @PART[restock-drone-core-0625-1]:NEEDS[ReStockPlus]
        {
            @TechRequired = advElectrics
        }

        @PART[restock-drone-core-1875-1]:NEEDS[ReStockPlus]
        {
            @TechRequired = electronics
        }

        @PART[restock-drone-core-375-1]:NEEDS[ReStockPlus]
        {
            @TechRequired = automation
        }

        PARTUPGRADE:NEEDS[!zzzProbalismDisableSAS3]
        {
            name = Remote-Guidance-Advancements
            partIcon = probeStackSmall
            title = Remote Guidance Advancements
            manufacturer = Dynamic Manufacturing & Design
            description = Unlocks SAS level 3 for RGUs
        }

        @PARTUPGRADE[Remote-Guidance-Advancements]:NEEDS[!zzzProbalismDisableSAS3]:AFTER[Probalism-CTT]
        {
            %techRequired = advUnmanned
            %entryCost = 0
            %cost = 0
        }

        @PART[probeStackSmall|probeStackLarge|mk2DroneCore]
        {
            @MODULE[ModuleSAS]
            {
                %SASServiceLevel = 2
                %UPGRADES {}
                @UPGRADES
                {
                    !UPGRADE:HAS[#name__[Remote-Guidance-Advancements]] {}
                    UPGRADE
                    {
                        name__ = Remote-Guidance-Advancements
                        techRequired__ = advUnmanned
                        SASServiceLevel = 3
                    }
                }
            }
        }

        @PART[mk1DroneCore]:NEEDS[AirplanePlus]
        {
            @MODULE[ModuleSAS]
            {
                %SASServiceLevel = 2
                %UPGRADES {}
                @UPGRADES
                {
                    !UPGRADE:HAS[#name__[Remote-Guidance-Advancements]] {}
                    UPGRADE
                    {
                        name__ = Remote-Guidance-Advancements
                        techRequired__ = advUnmanned
                        SASServiceLevel = 3
                    }
                }
            }
        }

        @PART[restock-drone-core-0625-1|restock-drone-core-1875-1|restock-drone-core-375-1]:NEEDS[ReStockPlus]
        {
            @MODULE[ModuleSAS]
            {
                %SASServiceLevel = 2
                %UPGRADES {}
                @UPGRADES
                {
                    !UPGRADE:HAS[#name__[Remote-Guidance-Advancements]] {}
                    UPGRADE
                    {
                        name__ = Remote-Guidance-Advancements
                        techRequired__ = advUnmanned
                        SASServiceLevel = 3
                    }
                }
            }
        }

