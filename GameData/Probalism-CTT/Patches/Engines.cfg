// FM0 "Gnat" clone of the FM1 "Mite" with reduced propellant for use in "Start" tech node
+PART[Mite]:NEEDS[!Restock]:FOR[ProbalismCTT]
{
    @name = PBM_GNAT
    @TechRequired = start
    @entryCost = 0
    @cost = 25
    @title = FM0 "Gnat" Solid Fuel Booster
    @description = This engine is annoying to use, but it's all we've got. It is just enough rocket to get the space program headed upward.
    @tags = (motor (rocket (srb (gnat (FM0

    @RESOURCE[SolidFuel]
    {
        @amount = 12
        @maxAmount = 12
    }
}

+PART[Mite]:NEEDS[Restock]:AFTER[Restock]
{
    @name = PBM_GNAT
    @TechRequired = start
    @entryCost = 0
    @cost = 25
    @title = FM0 "Gnat" Solid Fuel Booster
    @description = A stripped-down starter booster built for programs that are long on ambition and short on budget. It is just enough rocket to get a test article pointed upward and remind everyone that gravity has opinions.
    @tags = (motor (rocket (srb (gnat (FM0

    @RESOURCE[SolidFuel]
    {
        @amount = 12
        @maxAmount = 12
    }
}

