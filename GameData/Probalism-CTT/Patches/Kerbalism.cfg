//------------------
// Kerbalism Changes
//------------------

@PART[kerbalism-greenhouse]:NEEDS[KerbalismConfig]:AFTER[KerbalismConfig]
{
    @TechRequired = advGrowthTech
}

@PART[kerbalism-gravityring]:NEEDS[KerbalismConfig]:AFTER[KerbalismConfig]
{
    @TechRequired = longTermHabitation
}

@PART[*]:HAS[@MODULE[Configure]:HAS[#title[Crew?Experiments],@UPGRADES/UPGRADE:HAS[#name__[Upgrade-Slots],#techRequired__[shortTermHabitation]]]]:NEEDS[ProfileDefault]:AFTER[zzzKerbalismDefault]
{
    @MODULE[Configure]:HAS[#title[Crew?Experiments]]
    {
        @UPGRADES
        {
            @UPGRADE:HAS[#name__[Upgrade-Slots],#techRequired__[shortTermHabitation]]
            {
                @techRequired__ = fieldScience
            }
        }
    }
}

@PART[*]:HAS[@MODULE[Configure]:HAS[#title[Crew?Experiments],@UPGRADES/UPGRADE:HAS[#techRequired__[shortTermHabitation]]]]:NEEDS[ProfileDefault]:AFTER[zzzKerbalismDefault]
{
    @MODULE[Configure]:HAS[#title[Crew?Experiments]]
    {
        @UPGRADES
        {
            @UPGRADE:HAS[#techRequired__[shortTermHabitation]],*
            {
                @techRequired__ = fieldScience
            }
        }
    }
}

