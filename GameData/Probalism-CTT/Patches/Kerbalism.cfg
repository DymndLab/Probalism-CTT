//------------------
// Kerbalism Changes
//------------------

@PART[kerbalism-greenhouse]:NEEDS[KerbalismConfig]:AFTER[KerbalismConfig]
{
    @TechRequired = advGrowthTech
}

@PART[kerbalism-gravityring]:NEEDS[KerbalismConfig]:AFTER[KerbalismConfig]
{
    @TechRequired = longTermHabitation
}

//--------------------------
// Kerbalism Upgrade Changes
//--------------------------

@KERBALISM_GROUP_SETTINGS:NEEDS[KerbalismConfig,FeatureScience,ProfileDefault]:BEFORE[KerbalismDefault]
{
    @CREWED_EXPERIMENTS
    {
        @UpgradeTech = shortTermHabitation
    }

    @LAB_EXPERIMENTS
    {
        @UpgradeTech = specializedScienceTech
        @ReconfigureTech = scientificOutposts
    }

    @UNDERWATER_EXPERIMENTS
    {
        @UpgradeTech = fieldScience
    }
}

@KERBALISM_HDD_SIZES:NEEDS[KerbalismConfig,FeatureScience,ProfileDefault]:BEFORE[KerbalismDefault]
{
    @Upgrades
    {
        @SAMPLE_CAPACITY_MULTIPLIERS
        {
            @FirstUpgradeTech = miniaturization
            @SecondUpgradeTech = advExploration
            @ThirdUpgradeTech = fieldScience
        }
    }
}

@KERBALISM_GROUP_SETTINGS:NEEDS[KerbalismConfig,FeatureScience,ProfileDefault]:BEFORE[KerbalismDefault]
{
    @LAB_EXPERIMENTS
    {
        @CHILLED
        {
            @UnlockTech = growthTech
        }
    }
}