@PART[Benjee10_MMSEV_baseGreenhouse]:NEEDS[Benjee10_MMSEV,KerbalismConfig,ProfileDefault]:AFTER[KerbalismDefault]
{
    @TechRequired = growthTech
    !MODULE[ModuleKerbNetAccess] {}
    !MODULE[Greenhouse] {}
    MODULE
    {
        name = Greenhouse
        crop_resource = Food
        crop_size = 16.5375
        crop_rate = 0.00000023148
        ec_rate = 1.5
        light_tolerance = 400.0
        pressure_tolerance = 0.1
        radiation_tolerance = 0.000008333

        INPUT_RESOURCE
        {
            name = Ammonia
            rate = 0.000057421875
        }
        INPUT_RESOURCE
        {
            name = Water
            rate = 0.00000191406
        }
        INPUT_RESOURCE
        {
            name = WasteAtmosphere
            rate = 0.00074747985
        }
        INPUT_RESOURCE
        {
            name = CarbonDioxide
            rate = 0.000249159945
        }
        OUTPUT_RESOURCE
        {
            name = Oxygen
            rate = 0.00103427895
        }
    }

    %RESOURCE[Ammonia]
    {
        %amount = 163.2
        %maxAmount = 163.2
    }
    %RESOURCE[CarbonDioxide]
    {
        %amount = 2700
        %maxAmount = 2700
    }
    %RESOURCE[Water]
    {
        %amount = 6.6
        %maxAmount = 6.6
    }
}

