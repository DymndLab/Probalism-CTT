    // SAS Upgrades
    @PART[nflv-drone-core-5-1|nflv-drone-core-75-1]:NEEDS[NearFutureLaunchVehicles]:AFTER[NearFutureLaunchVehicles]
    {
        @MODULE[ModuleSAS]
        {
            %SASServiceLevel = 2
            %UPGRADES {}
            @UPGRADES
            {
                !UPGRADE:HAS[#name__[Remote-Guidance-Advancements]] {}
                UPGRADE
                {
                    name__ = Remote-Guidance-Advancements
                    techRequired__ = advUnmanned
                    SASServiceLevel = 3
                }
            }
        }
    }

