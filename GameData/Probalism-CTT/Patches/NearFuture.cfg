//----------------------------
// Near Future Launch Vehicles
//----------------------------

        @PART[nflv-drone-core-5-1]:NEEDS[NearFutureLaunchVehicles]:AFTER[NearFutureLaunchVehicles]
        {
            @TechRequired = unmannedTech
        }

        @PART[nflv-drone-core-75-1]:NEEDS[NearFutureLaunchVehicles]:AFTER[NearFutureLaunchVehicles]
        {
            @TechRequired = mechatronics
        }

        @PART[truss-octo-drone-01]:NEEDS[NearFutureConstruction]
        {
            @MODULE[ModuleSAS]
            {
                %SASServiceLevel = 2
                %UPGRADES {}
                @UPGRADES
                {
                    !UPGRADE:HAS[#name__[Remote-Guidance-Advancements]] {}
                    UPGRADE
                    {
                        name__ = Remote-Guidance-Advancements
                        techRequired__ = advUnmanned
                        SASServiceLevel = 3
                    }
                }
            }
        }

        @PART[nflv-drone-core-5-1|nflv-drone-core-75-1]:NEEDS[NearFutureLaunchVehicles]
        {
            @MODULE[ModuleSAS]
            {
                %SASServiceLevel = 2
                %UPGRADES {}
                @UPGRADES
                {
                    !UPGRADE:HAS[#name__[Remote-Guidance-Advancements]] {}
                    UPGRADE
                    {
                        name__ = Remote-Guidance-Advancements
                        techRequired__ = advUnmanned
                        SASServiceLevel = 3
                    }
                }
            }
        }
