//-------------------------------
// Probalism-CTT Plane Parts Patch
//-------------------------------

//---------------
// Tiny Basic Fin
//---------------

+PART[basicFin]:NEEDS[!Restock]:FOR[ProbalismCTT]
{
    @name = pbm-basicFin-tiny
    @rescaleFactor = 0.4
    @title = Tiny Basic Fin
    @mass = 0.004

    @MODULE[ModuleLiftingSurface]
    {
        @deflectionLiftCoeff = 0.03
    }

    VABORGANIZER:NEEDS[VABOrganizer]
    {
        organizerSubcategory = controlSurfaces
    }
}

@PART[pbm-basicFin-tiny]:NEEDS[!Restock,VABOrganizer]:FOR[ProbalismCTT]
{
    %organizerSubcategory = controlSurfaces
}

+PART[basicFin]:NEEDS[Restock]:AFTER[Restock]
{
    @name = pbm-basicFin-tiny
    @rescaleFactor = 0.4
    @title = Tiny Basic Fin
    @mass = 0.004

    @MODULE[ModuleLiftingSurface]
    {
        @deflectionLiftCoeff = 0.03
    }

    VABORGANIZER:NEEDS[VABOrganizer]
    {
        organizerSubcategory = controlSurfaces
    }
}

@PART[pbm-basicFin-tiny]:NEEDS[Restock,VABOrganizer]:AFTER[Restock]
{
    %organizerSubcategory = controlSurfaces
}
