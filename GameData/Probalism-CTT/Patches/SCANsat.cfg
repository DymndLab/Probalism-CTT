//--------------------------------------
// Contract Pack Compatibility
//--------------------------------------

        // Remove the official SCANsat trivial multispectral offer so Kerbol Laboratories can own
        // the biome/anomaly survey niche without suppressing the rest of the contracts for SCANsat

        @CONTRACT_TYPE[SCAN_Trivial]:NEEDS[SCANsat,ContractConfigurator]:AFTER[SCANsat]
        {
            @DATA_EXPAND,1
            {
                @scanString1 = [ "AltimetryLoRes", "AltimetryHiRes", "ResourceLoRes", "ResourceHiRes", "VisualHiRes" ]
            }
        }



