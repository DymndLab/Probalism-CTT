//----------
// Kerbalism 
//----------

@PART[sspx-habitation-1875-1]:HAS[@MODULE[Configure]:HAS[#title[Pod],!SETUP[Shower]]]:NEEDS[StationPartsExpansionRedux,ProfileDefault,FeatureComfort]:AFTER[zzzKerbalismDefault]
{
    @MODULE[Configure]:HAS[#title[Pod]]
    {
        SETUP
        {
            name = Shower
            desc = This is not a shower - but close your eyes and believe it.
            tech = recycling
            mass = 0.001
            cost = 50

            MODULE
            {
                type = ProcessController
                id_field = resource
                id_value = _SickbayShower
            }
        }
    }
}

