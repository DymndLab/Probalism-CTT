//---------------------------
// Probalism-CTT Utility Patch
//---------------------------

//----------
// Parachutes
//----------

        //Title - Personal Parachute
        @PART[evaChute]
        {
            @TechRequired = aviation
        }

        //Title - Nk-06 Parachute
        @PART[parachuteSingle]
        {
            @TechRequired = survivability
        }

        //Title - Nc-01RD Radial-Mount Drogue Chute
        @PART[radialDrogue]
        {
            @TechRequired = enhancedSurvivability
        }

        //Title - Nc-04R Radial-Mount Parachute
        @PART[parachuteRadial]
        {
            @TechRequired = enhancedSurvivability
        }

//------------
// Heat Shields
//------------

        //Title - Heat Shield (1.25m)
        @PART[HeatShield1]
        {
            @TechRequired = enhancedSurvivability
        }

//-----
// Solar
//-----

//--------------------------
// Radiators and Heat Systems
//--------------------------

        //Title - XT-050 Thermal Control System (Small)
        @PART[foldingRadSmall]
        {
            @TechRequired = heatManagementSystems
        }

        //Title - XT-250 Thermal Control System (Medium)
        @PART[foldingRadMed]
        {
            @TechRequired = advHeatManagement
        }

        //Title - XT-k001 Thermal Control System (Large)
        @PART[foldingRadLarge]
        {
            @TechRequired = specializedRadiators
        }

//-------
// Utility
//-------

        //Title - EVA Jetpack
        @PART[evaJetpack]
        {
            @TechRequired = reentryPods
        }

        //Title - Inflatable Airlock     
        @PART[InflatableAirlock]:NEEDS[SquadExpansion/MakingHistory]
        {
            @TechRequired = reentryPods
        }

        //Title - 1.25m Service Bay
        @PART[ServiceBay_125_v2]
        {
            @TechRequired = simpleCommandModules
        }
        
        //Title - 1.875m Service Bay
        @PART[restock-service-bay-1875-1]:NEEDS[ReStockPlus]
        {
            @TechRequired = heavyCommandModules
        }

        //Title - Service Bay (2.5m)
        @PART[ServiceBay_250_v2]
        {
            @TechRequired = specializedCommandModules
        }

        //Title - AL-1 'Lychee' Inflatable Docking Airlock
        @PART[restock-airlock-1]:NEEDS[ReStockPlus]
        {
            @TechRequired = reentryPods
        }
